e Reporta","memo":"Continuidade operacional: presume-se que a entidade continuará operando no futuro previsível.","coment":"A alternativa correta é <b>B</b> — não tem a intenção e nem a necessidade de entrar em liquidação ou deixar de negociar.. Pela premissa de continuidade, presume-se que a entidade continuará operando, sem intenção ou necessidade de liquidação ou encerramento."},{"num":66,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2025","q":"De acordo com a NBC TG Estrutura Conceitual - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, patrimônio líquido é a participação nos ativos da entidade após","alts":["A) a dedução de seus passivos.","B) a dedução de suas despesas.","C) o acréscimo de suas receitas.","D) o acréscimo de seus passivos."],"g":"A","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Contribuições e distribuições aos detentores de direitos sobre o patrimônio ficam fora de receitas e despesas.","coment":"A alternativa correta é <b>A</b> — a dedução de seus passivos.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":67,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2025","q":"A NBC TG ESTRUTURA CONCEITUAL descreve uma série de conceitos utilizados para a elaboração de relatórios financeiros para fins gerais. Relacione cada elemento a seguir com sua correta definição segundo a Estrutura Conceitual. Elemento Definição a. Despesa b. Patrimônio Líquido c. Receita I. Aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido. II. Reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido. III. Participação residual nos ativos da entidade após a dedução de todos os seus passivos. Os elementos a, b e c correspondem, respectivamente, às definições","alts":["A) II – III – I.","B) I – III – II.","C) II – I – III.","D) I – II – III."],"g":"A","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Despesa: redução nos ativos ou aumento nos passivos que reduz o PL, exceto distribuições aos proprietários.","coment":"A alternativa correta é <b>A</b> — II – III – I.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":68,"meta":"FGV – Analista Judiciário TRT24 – TRT 24 – Administrativa – Contabilidade – 2025","q":"De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, um ativo, necessariamente,","alts":["A) é um bem corpóreo.","B) está atrelado a eventos futuros previsíveis.","C) tem o potencial de produzir benefícios econômicos.","D) representa um direito presente perante os acionistas.","E) foi adquirido pela entidade em uma transação com terceiros."],"g":"C","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado.","coment":"A alternativa correta é <b>C</b> — tem o potencial de produzir benefícios econômicos.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":69,"meta":"FGV – Analista de Gestão Municipal (Pref SJC) – Pref SJC – Ciências Contábeis – 2025","q":"Em junho de 2025, uma entidade do setor público reconheceu R$ 60.000,00 como despesas orçamentárias com auxílio-alimentação pagas por meio de cartão magnético. Do valor, R$ 48.000,00 foram destinados a servidores e R$ 12.000,00, a estagiários. Em relação ao elemento de despesa, deve ser contabilizado como “Auxílio-Alimentação” o seguinte valor:","alts":["A) zero.","B) R$ 12.000,00.","C) R$ 36.000,00.","D) R$ 48.000,00.","E) R$ 60.000,00."],"g":"E","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Receita: aumento nos ativos ou redução nos passivos que aumenta o PL, exceto contribuições dos proprietários.","coment":"A alternativa correta é <b>E</b> — R$ 60.000,00.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":70,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2025","q":"A NBC TG ESTRUTURA CONCEITUAL estabelece os conceitos dos elementos das demonstrações contábeis. Com base nessa norma, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) Ativo é um recurso econômico presente de propriedade da entidade como resultado de eventos passados. ( ) Passivo é uma obrigação futura da entidade de transferir um recurso econômico como resultado de eventos passados. ( ) Receitas são aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido, exceto aqueles referentes a contribuições de detentores de direitos sobre o patrimônio. ( ) Despesas são reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido, exceto aqueles referentes a distribuições aos detentores de direitos sobre o patrimônio. As afirmativas são, respectivamente,","alts":["A) F – F – V – V.","B) F – V – F – V.","C) V – F – V – F.","D) V – V – F – F."],"g":"A","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Despesa: redução nos ativos ou aumento nos passivos que reduz o PL, exceto distribuições aos proprietários.","coment":"A alternativa correta é <b>A</b> — F – F – V – V.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":71,"meta":"FGV – Técnico (Nittrans) – Nittrans – Contábil – 2025","q":"Um ativo é um recurso controlado no presente pela entidade como resultado de evento passado. Para avaliar se a entidade controla o recurso no presente, deve ser observada a existência dos seguintes indicadores de controle, a exceção de um. Assinale-o:","alts":["A) Posse física legal.","B) Direito legítimo ao potencial de serviços.","C) Acesso ao recurso ou capacidade de negar ou restringir o acesso a esses.","D) Meios que assegurem que o recurso seja utilizado para alcançar os seus objetivos.","E) Direito legítimo à capacidade para gerar os benefícios econômicos advindos do recurso."],"g":"A","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado.","coment":"A alternativa correta é <b>A</b> — Posse física legal.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":72,"meta":"FGV – Técnico Leg (ALEP) – ALEP – Técnico em Contabilidade – 2024","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, o patrimônio líquido de uma entidade representa a participação residual","alts":["A) nos ativos após a dedução de todos os seus passivos.","B) nos ativos após a dedução de todas as suas despesas.","C) nas receitas após a dedução de todos os seus ativos.","D) nos passivos após a dedução de todas as suas despesas.","E) nas receitas após a dedução de todas as suas despesas."],"g":"A","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Receita: aumento nos ativos ou redução nos passivos que aumenta o PL, exceto contribuições dos proprietários.","coment":"A alternativa correta é <b>A</b> — nos ativos após a dedução de todos os seus passivos.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":73,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"Desreconhecimento é a retirada de parte ou da totalidade de ativo ou passivo reconhecido do balanço patrimonial da entidade. O desreconhecimento normalmente ocorre quando esse item não atende mais à definição de ativo ou passivo, que expirou, foi consumido, recebido, executado ou transferido. A máquina utilizada para a produção do principal produto de uma determinada entidade deve ser desreconhecida quando","alts":["A) perder todo o potencial de produzir benefícios econômicos para a entidade.","B) estiver parcialmente depreciado.","C) sofrer perda de valor recuperável.","D) estiver sob controle da entidade."],"g":"A","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Controle envolve a capacidade de direcionar o uso do recurso e obter benefícios.","coment":"A alternativa correta é <b>A</b> — perder todo o potencial de produzir benefícios econômicos para a entidade.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":74,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"Conforme a NBC TG – ESTRUTURA CONCEITUAL, uma Receita reflete aumento nos ativos, ou redução nos passivos, que resultam em aumentos no patrimônio líquido, exceto aqueles referentes a contribuições de detentores de direitos sobre o patrimônio. Avalie se são reconhecidos como Receita, nesse contexto, os seguintes itens: I. Ganho de aplicação financeira. II. Transferência de estoques a clientes. III. Ganho na venda de imobilizado. IV. Entrada de recursos pela emissão/venda de debêntures. V. Entrada de recursos pela integralização do capital social. VI. Ganho na venda de ações em tesouraria. São considerados receitas os itens","alts":["A) IV, V e VI.","B) II, III e VI.","C) I, III e IV.","D) I, II e III."],"g":"D","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Receita: aumento nos ativos ou redução nos passivos que aumenta o PL, exceto contribuições dos proprietários.","coment":"A alternativa correta é <b>D</b> — I, II e III.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":75,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"De acordo com o conceito de manutenção de capital financeiro, o lucro é auferido somente se o montante financeiro (ou dinheiro) dos ativos líquidos no final do período exceder o montante financeiro (ou dinheiro) dos ativos líquidos no início do período, após excluir","alts":["A) compra e venda de ativos fixos durante o período.","B) distribuições para, e contribuições de, sócios durante o período.","C) reconhecimento contábil de receitas e de despesas durante o período.","D) recebimento de receitas e pagamentos de despesas durante o período."],"g":"B","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Despesa: redução nos ativos ou aumento nos passivos que reduz o PL, exceto distribuições aos proprietários.","coment":"A alternativa correta é <b>B</b> — distribuições para, e contribuições de, sócios durante o período.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":76,"meta":"FGV – Ana Prev (MACAEPREV) – MACAEPREV – Contabilidade – 2024","q":"Em relação à conceituação dos elementos patrimoniais, assinale V para a afirmativa verdadeira e F para a falsa, de acordo com a Estrutura Conceitual: ( ) Ativo é o recurso econômico presente controlado pela entidade como resultado de eventos passados. ( ) Passivo é a obrigação presente da entidade de transferir um recurso econômico como resultado de eventos passados. ( ) Patrimônio Líquido é a participação residual nas receitas da entidade após a dedução de todas as suas despesas. As afirmativas são, respectivamente,","alts":["A) V – V – F.","B) F – V – F.","C) V – F – F.","D) F – F – V.","E) V – V – V."],"g":"A","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Ativo não precisa ser corpóreo nem necessariamente de propriedade legal.","coment":"A alternativa correta é <b>A</b> — V – V – F.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":77,"meta":"FGV – Contador (Pref Macaé) – Pref Macaé – 2024","q":"Uma livraria vendia livros de contabilidade e de direito. Os livros de contabilidade eram vendidos por R$200 e os de direito por R$160. Em setembro de 2024, a livraria fez uma ação promocional, de modo que quando um cliente adquirisse um livro de contabilidade, poderia comprar um livro de direito por R$80. Neste mês, cem clientes participaram da promoção e compraram os dois livros. Além disso, 50 clientes compraram apenas o livro de contabilidade e 50 compraram apenas o livro de direito. Assinale a opção que indica a Receita Bruta da livraria em 30/09/2024.","alts":["A) R$28.000.","B) R$42.000.","C) R$46.000.","D) R$54.000.","E) R$56.000."],"g":"C","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Contribuições e distribuições aos detentores de direitos sobre o patrimônio ficam fora de receitas e despesas.","coment":"A alternativa correta é <b>C</b> — R$46.000.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":78,"meta":"FGV – AGP (Pref Vitória) – Pref Vitória – Contador – 2024","q":"De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o custo histórico de um ativo é ajustado ao longo do tempo para refletir, quando aplicável, certas condições. Assinale a opção que não reflete uma dessas condições.","alts":["A) A integralização do capital social, com reservas de lucros, que havia sido subscrito.","B) Os pagamentos recebidos que extinguem a totalidade ou parte do ativo.","C) O consumo da totalidade ou parte do recurso econômico que constitui o ativo.","D) A provisão de juros para refletir componentes de financiamento do ativo.","E) O efeito de eventos que fazem com que a totalidade ou parte do custo histórico do ativo não seja mais recuperável."],"g":"A","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Ativo não precisa ser corpóreo nem necessariamente de propriedade legal.","coment":"A alternativa correta é <b>A</b> — A integralização do capital social, com reservas de lucros, que havia sido subscrito.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":79,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2024","q":"Leia o fragmento a seguir: Passivo é a obrigação _____ da entidade de transferir um recurso econômico como resultado de eventos _____. Assinale a opção cujos itens completam corretamente as lacunas do fragmento acima.","alts":["A) futura / presente","B) futura / passados","C) presente / futuros","D) presente / passados"],"g":"D","topic":"passivo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Obrigação presente existe quando a entidade não tem capacidade prática de evitar a transferência.","coment":"A alternativa correta é <b>D</b> — presente / passados. Passivo é obrigação presente de transferir recurso econômico, existente como resultado de evento passado."},{"num":80,"meta":"FGV – Contador (CGM RJ) – Pref RJ – 2023","q":"O conceito de prudência está presente na Estrutura Conceitual. Nota-se que ativos e receitas não devem estar superavaliados, da mesma forma que passivos e despesas não devem estar subavaliados. Nesse sentido, o conceito se aplica para a situação de maior incerteza para a mensuração de um(a):","alts":["A) mercadoria para estoque;","B) empréstimo bancário pré-fixado;","C) aplicação financeira pré-fixada;","D) estimativa de provisão judicial;","E) ativo imobilizado."],"g":"D","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Contribuições e distribuições aos detentores de direitos sobre o patrimônio ficam fora de receitas e despesas.","coment":"A alternativa correta é <b>D</b> — estimativa de provisão judicial;. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":81,"meta":"FGV – TecGes Admin (ALEMA) – ALEMA – Contador – \"Sem Especialidade\" – 2023","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, ativo é um direito que tem o potencial de produzir benefícios econômicos, presente e controlado pela entidade, como resultado de eventos passados. As opções a seguir indicam exemplos de direitos que representam ativos reconhecidos pela Contabilidade e que correspondem à obrigação de outra parte, à exceção de uma. Assinale-a.","alts":["A) Direitos de receber caixa.","B) Direitos de receber produtos ou serviços.","C) Direitos de influenciar a tomada de decisões estratégicas.","D) Direitos de trocar recursos econômicos com outra parte em condições favoráveis.","E) Direitos de beneficiar-se de obrigação de outra parte para transferir um recurso econômico se ocorrer evento futuro incerto especificado."],"g":"C","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Controle envolve a capacidade de direcionar o uso do recurso e obter benefícios.","coment":"A alternativa correta é <b>C</b> — Direitos de influenciar a tomada de decisões estratégicas.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":82,"meta":"FGV – AL (CAM DEP) – CAM DEP – Contador – 2023","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, ativo é um recurso econômico presente controlado pela entidade como resultado de eventos passados. Um recurso econômico é um direito que tem o potencial de produzir benefícios econômicos. Para que esse potencial exista","alts":["A) o seu valor justo deve ser mensurado com objetividade.","B) deve haver uma contrapartida correspondente no passivo.","C) precisa ser provável que o direito irá produzir benefícios econômicos futuros.","D) precisa ser certo que o direito irá produzir benefícios econômicos futuros.","E) é necessário que, em ao menos uma circunstância, o direito irá produzir para a entidade benefícios econômicos além daqueles disponíveis para todas as outras partes."],"g":"E","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado.","coment":"A alternativa correta é <b>E</b> — é necessário que, em ao menos uma circunstância, o direito irá produzir para a entidade benefícios econômicos além daqueles disponíveis para todas as outras partes.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":83,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, ativo é um recurso econômico presente controlado pela entidade como resultado de eventos passados, sendo que recurso econômico é um direito que tem o potencial de produzir benefícios econômicos. Um direito que tem o potencial de produzir benefícios econômicos e que não corresponde à obrigação de outra parte são os direitos de","alts":["A) receber caixa.","B) utilizar propriedade intelectual.","C) receber produtos ou serviços.","D) trocar recursos econômicos com outra parte em condições favoráveis.","E) beneficiar-se de obrigação de outra parte para transferir um recurso econômico se ocorrer evento futuro incerto especificado."],"g":"B","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Ativo não precisa ser corpóreo nem necessariamente de propriedade legal.","coment":"A alternativa correta é <b>B</b> — utilizar propriedade intelectual.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":84,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, patrimônio líquido é a participação residual nos ativos da entidade após a dedução","alts":["A) do capital próprio.","B) de todos os seus passivos.","C) da distribuição do resultado.","D) das despesas reconhecidas no período.","E) do saldo entre as receitas e as despesas."],"g":"B","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Receita: aumento nos ativos ou redução nos passivos que aumenta o PL, exceto contribuições dos proprietários.","coment":"A alternativa correta é <b>B</b> — de todos os seus passivos.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":85,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"Segundo a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, as receitas e as despesas são os elementos das demonstrações contábeis de uma entidade que se referem a(o)","alts":["A) Posição financeira.","B) Posição econômica.","C) Situação patrimonial.","D) Desempenho financeiro.","E) Desempenho econômico."],"g":"D","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Despesa: redução nos ativos ou aumento nos passivos que reduz o PL, exceto distribuições aos proprietários.","coment":"A alternativa correta é <b>D</b> — Desempenho financeiro.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":86,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"As receitas são aumentos nos ativos ou reduções nos passivos que resultam em aumentos no patrimônio líquido, com exceção","alts":["A) dos ganhos.","B) das variações monetárias.","C) dos tributos sobre os lucros.","D) das que acontecem de modo não recorrente.","E) das contribuições de detentores de direitos sobre o patrimônio."],"g":"E","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Receitas e despesas representam alterações em ativos e passivos que refletem desempenho.","coment":"A alternativa correta é <b>E</b> — das contribuições de detentores de direitos sobre o patrimônio.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":87,"meta":"FGV – Analista Judiciário TRT13 – TRT 13 – Administrativa – Contabilidade – 2022","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, em uma entidade, um ativo deve","alts":["A) ter liquidez.","B) ser mensurado pelo custo.","C) relacionar-se com os proprietários da entidade.","D) apresentar o potencial de produzir benefícios econômicos.","E) representar um recurso financeiro para a entidade que o apresenta."],"g":"D","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Recurso econômico é um direito que tem potencial de produzir benefícios econômicos.","coment":"A alternativa correta é <b>D</b> — apresentar o potencial de produzir benefícios econômicos.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":88,"meta":"FGV – Per Cri (PCA AP) – PCA AP – Ciências Contábeis – 2022","q":"O custo histórico de um ativo adquirido é o valor dos custos incorridos em sua aquisição, compreendendo a contraprestação paga para adquirir o ativo e os custos de transação. O custo histórico do ativo é atualizado ao longo do tempo para refletir, se aplicável, os seguintes fatos à exceção de um. Assinale-o.","alts":["A) pagamentos recebidos que extinguem a totalidade ou parte do ativo.","B) o consumo da totalidade ou parte do recurso econômico que constitui o ativo.","C) a provisão de juros que reflete qualquer componente de financiamento do ativo.","D) a variação do poder aquisitivo médio da moeda brasileira.","E) o efeito de eventos que fazem com que a totalidade ou parte do custo histórico do ativo não seja mais recuperável."],"g":"D","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Controle envolve a capacidade de direcionar o uso do recurso e obter benefícios.","coment":"A alternativa correta é <b>D</b> — a variação do poder aquisitivo médio da moeda brasileira.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":89,"meta":"FGV – AnA (FunSaúde CE) – FunSaúde CE – Contabilidade – 2021","q":"O custo histórico do ativo é atualizado ao longo do tempo para refletir, se aplicável, os fatores listados a seguir, à exceção de um. Assinale-o.","alts":["A) O consumo da totalidade ou parte do recurso econômico que constitui o ativo.","B) Os pagamentos recebidos que extinguem a totalidade ou parte do ativo.","C) O efeito de eventos que fazem com que a totalidade ou parte do custo histórico do ativo não seja mais recuperável.","D) A provisão de juros para refletir qualquer componente de financiamento do ativo.","E) Os efeitos da inflação no ativo imobilizado."],"g":"E","topic":"ativo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Controle envolve a capacidade de direcionar o uso do recurso e obter benefícios.","coment":"A alternativa correta é <b>E</b> — Os efeitos da inflação no ativo imobilizado.. Ativo é recurso econômico presente controlado pela entidade como resultado de evento passado, com potencial de gerar benefícios econômicos."},{"num":90,"meta":"FGV – Técnico (FunSaúde CE) – FunSaúde CE – Contabilidade – 2021","q":"Os recursos econômicos presentes controlados por uma entidade como resultado de eventos passados são denominados","alts":["A) ativos.","B) passivos.","C) receitas.","D) despesas.","E) reservas."],"g":"A","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Despesa: redução nos ativos ou aumento nos passivos que reduz o PL, exceto distribuições aos proprietários.","coment":"A alternativa correta é <b>A</b> — ativos.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":91,"meta":"FGV – Ana Esp (IMBEL) – IMBEL – Analista Contábil – 2021","q":"Os elementos das demonstrações contábeis, definidos na Estrutura Conceitual da Contabilidade, são ativos, passivos, patrimônio líquido, receitas e despesas. Assinale a opção que indica os elementos que se referem à posição financeira da entidade que reporta.","alts":["A) Ativos, passivos e patrimônio líquido, apenas.","B) Receitas e despesas, apenas.","C) Ativos e receitas, apenas.","D) Ativos, patrimônio líquido e receitas, apenas.","E) Passivos e despesas, apenas."],"g":"A","topic":"receita e despesa","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Despesa: redução nos ativos ou aumento nos passivos que reduz o PL, exceto distribuições aos proprietários.","coment":"A alternativa correta é <b>A</b> — Ativos, passivos e patrimônio líquido, apenas.. Receitas e despesas são alterações em ativos e passivos que aumentam ou reduzem o patrimônio líquido, exceto transações com proprietários nessa qualidade."},{"num":92,"meta":"FGV – Ass SG (COMPESA) – COMPESA – Técnico em Contabilidade – 2018","q":"Assinale a opção que indica uma característica essencial para a existência de um passivo em uma entidade.","alts":["A) Obrigação presente.","B) Obrigação futura.","C) Mensuração precisa.","D) Prazo de realização conhecido.","E) Expectativa de futuros benefícios financeiros."],"g":"A","topic":"passivo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Evento passado é essencial para diferenciar obrigação presente de intenção futura.","coment":"A alternativa correta é <b>A</b> — Obrigação presente.. Passivo é obrigação presente de transferir recurso econômico, existente como resultado de evento passado."},{"num":93,"meta":"FGV – Ass SG (COMPESA) – COMPESA – Técnico em Contabilidade – 2018","q":"Assinale a opção correta em relação aos elementos do Balanço Patrimonial.","alts":["A) O ativo inclui todos os bens e os direitos de uma entidade.","B) O passivo é evidenciado de acordo com a ordem crescente de liquidez.","C) O patrimônio líquido é o investimento integralizado na entidade pelos acionistas.","D) O ativo total é sempre maior do que o passivo total.","E) O ativo e o passivo são divididos em circulante e em não circulante."],"g":"E","topic":"passivo","chapter":"Capítulo 4 — Elementos das Demonstrações Contábeis","memo":"Passivo é obrigação presente da entidade de transferir recurso econômico como resultado de evento passado.","coment":"A alternativa correta é <b>E</b> — O ativo e o passivo são divididos em circulante e em não circulante.. Passivo é obrigação presente de transferir recurso econômico, existente como resultado de evento passado."},{"num":94,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"Uma entidade deseja reconhecer um ativo em seu balanço patrimonial. A sua mensuração envolve estimativas que estão sujeitas a incertezas. Nesse caso, a entidade","alts":["A) não deve reconhecer nem divulgar o ativo, uma vez que não há objetividade em sua mensuração.","B) deve reconhecer o ativo sem mencionar a existência de estimativas, uma vez que estas foram elaboradas com zelo e são, portanto, confiáveis.","C) não deve reconhecer o ativo, mas evidenciá-lo em notas explicativas, uma vez que não há espaço para incertezas nas demonstrações contábeis elaboradas.","D) deve reconhecer o ativo e descrever e explicar as estimativas de forma clara e precisa, uma vez que o uso de estimativas razoáveis é parte essencial da elaboração de informações financeiras."],"g":"D","topic":"reconhecimento","chapter":"Capítulo 5 — Reconhecimento e Desreconhecimento","memo":"Nem todo item que atende à definição será reconhecido se a informação resultante não for útil.","coment":"A alternativa correta é <b>D</b> — deve reconhecer o ativo e descrever e explicar as estimativas de forma clara e precisa, uma vez que o uso de estimativas razoáveis é parte essencial da elaboração de informações financeiras.. O reconhecimento insere um item nas demonstrações quando isso fornece informação útil, considerando relevância e representação fidedigna."},{"num":95,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"O primeiro critério para a existência de um passivo é que a entidade tenha a obrigação. Em relação à obrigação, assinale a afirmativa correta.","alts":["A) Deve ser estabelecida por contrato.","B) Depende de ação passada praticada pela entidade.","C) É devida à outra parte, cuja identidade deve ser conhecida.","D) Representa o dever ou responsabilidade que a entidade não tem a capacidade prática de evitar.","E) Para que um valor específico seja reconhecido e mensurado, deve haver reconhecimento de um ativo por outra parte pelo mesmo valor."],"g":"D","topic":"reconhecimento","chapter":"Capítulo 5 — Reconhecimento e Desreconhecimento","memo":"Nem todo item que atende à definição será reconhecido se a informação resultante não for útil.","coment":"A alternativa correta é <b>D</b> — Representa o dever ou responsabilidade que a entidade não tem a capacidade prática de evitar.. O reconhecimento insere um item nas demonstrações quando isso fornece informação útil, considerando relevância e representação fidedigna."},{"num":96,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, as decisões sobre o reconhecimento dos ativos e dos passivos no balanço patrimonial são restringidas","alts":["A) pelo tempo.","B) pelo custo.","C) pelo uso de estimativas.","D) pelo julgamento da administração.","E) pela complexidade das transações."],"g":"B","topic":"reconhecimento","chapter":"Capítulo 5 — Reconhecimento e Desreconhecimento","memo":"Nem todo item que atende à definição será reconhecido se a informação resultante não for útil.","coment":"A alternativa correta é <b>B</b> — pelo custo.. O reconhecimento insere um item nas demonstrações quando isso fornece informação útil, considerando relevância e representação fidedigna."},{"num":97,"meta":"FGV – Sup (IMBEL) – IMBEL – Contador – 2021","q":"O valor contábil do patrimônio líquido de uma entidade equivale ao","alts":["A) valor disponibilizado pelos sócios da entidade.","B) valor de mercado total de direitos sobre o patrimônio na entidade.","C) valor contábil de todos os ativos reconhecidos menos o valor contábil de todos os passivos reconhecidos.","D) valor que poderia ser levantado, vendendo todos os ativos da entidade e liquidando todos os seus passivos.","E) valor que poderia ser levantado, vendendo a entidade como um todo em regime de continuidade operacional."],"g":"C","topic":"reconhecimento","chapter":"Capítulo 5 — Reconhecimento e Desreconhecimento","memo":"Nem todo item que atende à definição será reconhecido se a informação resultante não for útil.","coment":"A alternativa correta é <b>C</b> — valor contábil de todos os ativos reconhecidos menos o valor contábil de todos os passivos reconhecidos.. O reconhecimento insere um item nas demonstrações quando isso fornece informação útil, considerando relevância e representação fidedigna."},{"num":98,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2025","q":"De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, com relação às implicações das características qualitativas para a escolha da base de mensuração, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) Utilizar consistentemente as mesmas bases de mensuração para os mesmos itens, seja de período a período, na entidade que reporta ou em um único período para diferentes entidades, prejudica a comparabilidade das demonstrações. ( ) A mudança na base de mensuração pode tornar as demonstrações contábeis menos compreensíveis. Contudo, a mudança pode ser justificada se outros fatores compensarem a redução na compreensibilidade, por exemplo, se a mudança resulta em informações mais relevantes. ( ) A verificação é melhorada utilizando-se bases de mensuração que resultam em avaliações que podem ser independentemente corroboradas diretamente, por exemplo, observando os preços, ou indiretamente, por exemplo, verificando dados de entrada de modelo. As afirmativas são, respectivamente,","alts":["A) V – V – V.","B) V – V – F.","C) V – F – V.","D) F – V – V."],"g":"D","topic":"mensuração","chapter":"Capítulo 6 — Mensuração","memo":"Mensuração define o valor monetário pelo qual um elemento será reconhecido.","coment":"A alternativa correta é <b>D</b> — F – V – V.. A mensuração escolhe uma base monetária para representar ativos, passivos, receitas e despesas, considerando a utilidade da informação."},{"num":99,"meta":"FGV – AL (CAM DEP) – CAM DEP – Contador – 2023","q":"Em relação às bases de mensuração para reconhecimento dos elementos nas demonstrações contábeis, assinale a opção que indica apenas as que refletem valores de saída.","alts":["A) Custo corrente e valor justo.","B) Valor justo e valor realizável.","C) Custo corrente e custo histórico.","D) Valor realizável e custo corrente.","E) Custo histórico e valor realizável."],"g":"B","topic":"mensuração","chapter":"Capítulo 6 — Mensuração","memo":"Bases de mensuração do CPC 00: custo histórico e valor atual.","coment":"A alternativa correta é <b>B</b> — Valor justo e valor realizável.. A mensuração escolhe uma base monetária para representar ativos, passivos, receitas e despesas, considerando a utilidade da informação."},{"num":100,"meta":"FGV – AnA (FunSaúde CE) – FunSaúde CE – Contabilidade – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, os elementos reconhecidos nas demonstrações contábeis são quantificados em termos monetários, o que exige a seleção de uma base de mensuração. A base de mensuração que corresponde ao preço que seria recebido pela venda de ativo ou que seria pago pela transferência de passivo em transação ordenada entre participantes do mercado na data de mensuração é denominada","alts":["A) Custo Corrente.","B) Valor Atual.","C) Valor Justo.","D) Valor em Uso.","E) Valor de Cumprimento."],"g":"C","topic":"mensuração","chapter":"Capítulo 6 — Mensuração","memo":"Mensuração define o valor monetário pelo qual um elemento será reconhecido.","coment":"A alternativa correta é <b>C</b> — Valor Justo.. A mensuração escolhe uma base monetária para representar ativos, passivos, receitas e despesas, considerando a utilidade da informação."},{"num":101,"meta":"FGV – ANL (CM Fortal) – CM Fortaleza – Contador – 2024","q":"Após o período contábil, e antes da aprovação a que se referem as demonstrações contábeis, a administração de uma entidade determina que pretende liquidá-la. Nesse caso, a entidade deve elaborar as demonstrações contábeis do período finalizado","alts":["A) de modo resumido.","B) sem utilizar o pressuposto de continuidade.","C) em duas versões, seguindo e não seguindo o pressuposto de continuidade.","D) de acordo com o pressuposto de continuidade, com ajustes nas principais contas.","E) de acordo com o pressuposto de continuidade e divulgação do fato em notas explicativas."],"g":"B","topic":"apresentação e divulgação","chapter":"Capítulo 7 — Apresentação e Divulgação","memo":"Boa divulgação evita obscurecer informações materiais.","coment":"A alternativa correta é <b>B</b> — sem utilizar o pressuposto de continuidade.. Apresentação e divulgação comunicam a informação financeira por meio de classificação, agregação, desagregação e notas adequadas."},{"num":102,"meta":"FGV – Analista Judiciário (TJ RN) – TJ RN – Administrativa – Contabilidade – 2023","q":"A comunicação efetiva de informações nas demonstrações contábeis as torna mais relevantes e contribui para uma representação fidedigna de ativos, passivos, patrimônio líquido, receitas e despesas da entidade. Em se tratando dos preceitos das normas CPC 00 e CPC 26, é correto afirmar que:","alts":["A) a agregação torna as informações mais úteis ao resumir grande quantidade de detalhes. Contudo, deve-se observar um limite de 10%, de modo que as informações relevantes não sejam obscurecidas;","B) a entidade deve apresentar separadamente nas demonstrações contábeis cada classe material de itens semelhantes que ultrapassem o limite de 10%;","C) a entidade não precisa fornecer uma divulgação específica, requerida por Pronunciamento Técnico, Interpretação ou Orientação do CPC, se a informação resultante da divulgação não for material;","D) a comunicação efetiva de informações nas demonstrações contábeis requer concentrar-se em regras e objetivos de divulgação e apresentação em vez de concentrar-se em princípios;","E) os relatórios financeiros para fins gerais fornecem isitos do Pronunciamento específico, em detrimento da Estrutura Conceitual.. Apresentação e divulgação comunicam a informação financeira por meio de classificação, agregação, desagregação e notas adequadas."},{"num":104,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"O conceito de Capital é adotado pela maioria das entidades na elaboração das Demonstrações Contábeis. A seleção do conceito apropriado de Capital pela entidade deve ser baseada nas necessidades dos seus usuários, principalmente, os preocupados com a manutenção de capital nominal investido ou com o poder de compra do capital investido. A manutenção do Capital em que o lucro é auferido somente se o montante dos ativos líquidos no final do período exceder o montante dos ativos líquidos no início do período, após excluir quaisquer distribuições para, e contribuições de, sócios durante o período, é a Manutenção do","alts":["A) Capital Físico.","B) Capital Financeiro.","C) Capital Social.","D) Capital Integralizado."],"g":"B","topic":"capital e manutenção de capital","chapter":"Capítulo 8 — Conceitos de Capital e Manutenção de Capital","memo":"Capital físico é associado à capacidade operacional da entidade.","coment":"A alternativa correta é <b>B</b> — Capital Financeiro.. Os conceitos de capital e manutenção de capital influenciam a determinação do lucro e a preservação do capital financeiro ou físico."},{"num":105,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2024","q":"A NBC TG Estrutura Conceitual – ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO indica o conceito financeiro e o conceito físico de capital. De acordo com a norma, a seleção do conceito apropriado de capital pela entidade deve ser baseada","alts":["A) na forma jurídica dos atos e fatos contábeis.","B) na essência econômica dos atos e fatos contábeis.","C) nas determinações das entidades reguladoras.","D) nas necessidades dos usuários de suas demonstrações contábeis."],"g":"D","topic":"CPC 00 — revisão geral"   </div>

function updateBar(){
 const elapsed=Date.now()-inicioSlide, d=durAtual();
 const pct=Math.min(100, Math.max(0, elapsed/d*100));
 document.getElementById('timerfill').style.width=pct+'%';
 const rem=Math.max(0,d-elapsed);
 document.getElementById('contador').innerText = `Tela ${atual+1} de ${DATA.slides.length} • próximo em ${fmtSec(rem)}`;
}
function tick(){
 if(!paused){
   updateBar();
   if(Date.now()-inicioSlide>=durAtual()){ atual = Math.min(DATA.slides.length-1, atual+1); render(); }
 }
 requestAnimationFrame(tick);
}
document.addEventListener('keydown',e=>{
 if(e.code==='Space'){paused=!paused; if(!paused) inicioSlide+=Date.now()-pauseStart; else pauseStart=Date.now();}
 if(e.key==='ArrowRight'){atual=Math.min(DATA.slides.length-1,atual+1); render();}
 if(e.key==='ArrowLeft'){atual=Math.max(0,atual-1); render();}
 if(e.key==='Home'){atual=0; render();}
 if(e.key==='f'||e.key==='F'){document.documentElement.requestFullscreen?.();}
});
render(); tick();
</script></body></html>
