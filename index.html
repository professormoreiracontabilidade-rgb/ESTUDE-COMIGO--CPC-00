<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Estude Comigo - CPC 00 FGV - Vídeo Automático</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#111827;overflow:hidden}
.app{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
.slide{position:relative;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;background:linear-gradient(135deg,#e0f2fe,#f8fafc);border:8px solid #1e3a8a;border-radius:24px;padding:14px;display:flex;flex-direction:column;box-shadow:0 0 30px #0008;overflow:hidden}
.topo{background:#1e3a8a;color:white;padding:9px 12px;border-radius:15px;text-align:center;font-size:22px;font-weight:900;display:flex;justify-content:space-between;gap:10px;align-items:center}
.topo span{white-space:nowrap}
.stats{font-size:15px;background:#0f172a;padding:6px 9px;border-radius:10px}
.contador{text-align:center;font-size:14px;color:#475569;font-weight:bold;margin:4px 0}
.conteudo{flex:1;background:white;border-radius:18px;padding:24px;overflow:auto;font-size:24px;line-height:1.25;margin-top:6px}
.conteudo h1{margin:0 0 10px;color:#1e3a8a;font-size:31px;text-align:center}
.conteudo h2{color:#0f766e;font-size:24px;margin:7px 0}
.conteudo p{margin:7px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.box{background:#eff6ff;border-left:7px solid #2563eb;border-radius:13px;padding:12px}
.memo{background:#fef9c3;border-left:7px solid #ca8a04;border-radius:13px;padding:13px;font-weight:800;margin-top:10px}
.resposta{background:#dcfce7;border-left:7px solid #16a34a;border-radius:13px;padding:13px;margin-top:10px}
.questao-meta{font-size:18px;color:#334155;font-weight:900;margin-bottom:7px}
.questao-texto{font-size:20px;line-height:1.18;font-weight:700}
.alternativas{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
.altBtn{border:0;border-radius:12px;padding:8px 10px;background:#dbeafe;color:#111827;text-align:left;font-size:15.8px;line-height:1.12;font-weight:800;cursor:pointer;min-height:43px}
.altBtn:hover{background:#bfdbfe}
.altBtn.correta{background:#22c55e!important;color:white!important}
.altBtn.errada{background:#ef4444!important;color:white!important}
.altBtn.neutra{opacity:.88}
.feedback{display:none;margin-top:8px;padding:8px 10px;border-radius:12px;font-weight:900;font-size:16px;line-height:1.15}
.feedback.ok{display:block;background:#dcfce7;color:#14532d;border:2px solid #22c55e}
.feedback.no{display:block;background:#fee2e2;color:#7f1d1d;border:2px solid #ef4444}
.final-lista{font-size:14px;line-height:1.14}
.final-q{break-inside:avoid;background:#f8fafc;border-left:5px solid #2563eb;border-radius:10px;padding:8px;margin:8px 0}
.final-q h3{font-size:16px;margin:0 0 5px;color:#1e3a8a}
.botoes{display:flex;gap:8px;justify-content:center;margin-top:8px;align-items:center}
button{border:none;border-radius:12px;padding:9px 14px;font-size:16px;font-weight:900;cursor:pointer;color:white}
.voltar{background:#475569}.proximo{background:#2563eb}.reiniciar{background:#dc2626}.caneta{background:#7c3aed}.limpar{background:#ea580c}.borracha{background:#0f766e}.sair{background:#111827}.revisar{background:#0f766e}
.rodape{text-align:center;font-size:15px;font-weight:bold;color:#1e3a8a;margin-top:8px;padding-bottom:2px}
#canvasAnotacao{position:absolute;left:0;top:0;width:100%;height:100%;z-index:20;display:block;pointer-events:none;touch-action:none;cursor:crosshair}
.painelCaneta{position:absolute;right:18px;top:72px;z-index:30;display:none;gap:7px;background:#ffffffdd;padding:8px;border-radius:14px;border:2px solid #1e3a8a}
.painelCaneta button{font-size:13px;padding:7px 9px}.corBtn{width:28px;height:28px;border-radius:50%;padding:0;border:2px solid #111827}.corPreta{background:#111827}.corAzul{background:#2563eb}.corVermelha{background:#dc2626}.corVerde{background:#16a34a}.corRoxa{background:#7c3aed}.corLaranja{background:#ea580c}
.dicaCaneta{position:absolute;left:20px;top:74px;z-index:30;display:none;background:#fef3c7;border:2px solid #ca8a04;border-radius:12px;padding:7px 10px;font-weight:900;color:#78350f}
@media(max-width:700px){
 body{overflow:hidden}.slide{width:100vw;height:100vh;max-width:none;max-height:none;border:0;border-radius:0;padding:9px}
 .topo{font-size:14px;padding:7px;display:block}.stats{font-size:11px;margin-top:5px;display:inline-block}
 .contador{font-size:12px;margin:3px 0}.conteudo{padding:11px;font-size:17px}.conteudo h1{font-size:23px}.conteudo h2{font-size:20px}
 .grid2{grid-template-columns:1fr}.conteudo{padding:14px;font-size:18px}.questao-texto{font-size:16px}.questao-meta{font-size:14px}
 .alternativas{grid-template-columns:1fr;gap:5px}.altBtn{font-size:13px;padding:6px 8px;min-height:36px}
 button{font-size:12px;padding:8px 8px}.rodape{font-size:11px}.painelCaneta{top:54px;right:7px}
 .final-lista{font-size:12px}.final-q h3{font-size:14px}
}
@media print{
 body{overflow:visible;background:white}.app{display:block;height:auto}.slide{page-break-after:always;box-shadow:none;border-radius:0;width:100%;height:56.25vw}.botoes,.painelCaneta,.dicaCaneta,#canvasAnotacao{display:none!important}
}

.imagemBtn{background:#0891b2}
.painelImagem{
 position:absolute;right:18px;bottom:70px;width:30%;height:55%;z-index:18;
 background:#ffffffee;border:3px solid #0891b2;border-radius:16px;
 box-shadow:0 0 18px #0005;display:none;overflow:hidden
}
.imgTop{height:38px;background:#0891b2;color:white;display:flex;align-items:center;justify-content:space-between;padding:6px 10px;font-size:15px}
.imgTop button{background:#0f172a;font-size:13px;padding:4px 8px}
.imgArea{height:calc(100% - 82px);display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;color:#334155;font-size:15px;overflow:hidden;background:#f8fafc}
.imgArea img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.imgBtns{height:44px;display:flex;gap:6px;align-items:center;justify-content:center;background:#e0f2fe}
.imgBtns button{font-size:13px;padding:7px 9px;background:#0891b2}.pinImg{background:#ca8a04!important}.painelImagem.fixo{box-shadow:0 0 0 4px #facc15,0 0 18px #0005}
@media(max-width:700px){
 .painelImagem{right:8px;bottom:58px;width:42%;height:38%}
 .imgTop{font-size:11px;height:30px}.imgArea{font-size:11px;height:calc(100% - 66px)}
 .imgBtns{height:36px}.imgBtns button{font-size:10px;padding:5px 6px}
}


/* MODO ESTUDE COMIGO AUTOMÁTICO */
.autoPanel{
  margin-top:7px;
  background:#0f172a;
  color:white;
  border-radius:14px;
  padding:7px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-weight:900;
  font-size:14px;
}
.autoInfo{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.autoBarWrap{display:none}
.autoBar{display:none}
.autoBtns{display:none!important}
.autoBtns button{font-size:12px;padding:6px 8px;border-radius:9px}
.gravar{background:#16a34a}.pausar{background:#ca8a04}.manual{background:#475569}
.gravandoPulse{animation:pulseRec 1s infinite}
@keyframes pulseRec{0%,100%{box-shadow:0 0 0 0 #ef444488}50%{box-shadow:0 0 0 7px #ef444400}}

.questaoBadge{background:#fef3c7;color:#78350f;border:2px solid #f59e0b;border-radius:999px;padding:5px 10px;font-weight:900;display:inline-block}
.autoDestaque{background:#dcfce7;color:#14532d;border:2px solid #22c55e;border-radius:999px;padding:5px 10px;font-weight:900;display:inline-block}
.pensarBox{background:#eef2ff;border-left:7px solid #4f46e5;border-radius:13px;padding:10px;margin-top:8px;font-weight:900;color:#312e81}
.prepareTela{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,#eff6ff,#ffffff);border-radius:18px}
.prepareTela h1{font-size:56px;color:#1e3a8a;margin-bottom:14px}
.prepareTela p{font-size:30px;font-weight:900;color:#0f172a}
.prepareTela .numero{font-size:28px;color:#78350f;background:#fef3c7;border:3px solid #f59e0b;border-radius:999px;padding:10px 18px;margin-top:12px}
@media(max-width:700px){
 .autoPanel{font-size:11px;display:block;text-align:center;padding:6px}
 .autoInfo{justify-content:center;gap:6px}
 .autoBtns{justify-content:center}.autoBtns button{font-size:10px;padding:5px 6px}
}

</style>

<body>

 <div class="slide" id="slide">

<script>
const DATA = {"questions":[{"topic":"Situação e Finalidade","banca":"FGV – Analista – FunSaúde CE – Contabilidade – 2021","q":"Com relação à finalidade da Estrutura Conceitual da Contabilidade, de acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, analise as afirmativas a seguir.<br><br>I. Auxiliar o desenvolvimento das normas internacionais de contabilidade, para que tenham base em conceitos consistentes.<br>II. Auxiliar os usuários a interpretar e entender os pronunciamentos técnicos.<br>III. Auxiliar os responsáveis pela elaboração dos relatórios financeiros a desenvolver políticas contábeis consistentes.<br><br>São finalidades da Estrutura Conceitual da Contabilidade o que se afirma em","alts":["A) I, apenas.","B) II, apenas.","C) III, apenas.","D) II e III, apenas.","E) I, II e III."],"g":"E","coment":"As três afirmativas estão corretas. A Estrutura Conceitual auxilia quem desenvolve normas, quem prepara relatórios e quem interpreta os Pronunciamentos.","memo":"Finalidades = normas consistentes + políticas contábeis + interpretação."},{"topic":"Objetivo do Relatório Financeiro","banca":"FGV – Analista Legislativo – ALEGO – Contador – 2026","q":"Uma entidade afirma que os seus relatórios financeiros para fins gerais seguem o objetivo divulgado na Estrutura Conceitual para Relatório Financeiro.<br><br>Isso significa que os relatórios buscam","alts":["A) Maximizar o resultado financeiro obtido pela entidade que reporta, em cumprimento às normas contábeis.","B) Seguir as normas contábeis que considera mais apropriadas, para que a informação financeira seja mais prudente.","C) Publicar seus dados financeiros com precisão suficiente para que estes não recebam ressalva de auditores independentes.","D) Representar fonte de informação financeira ao maior número de usuários possível, em relação aos investimentos realizados na entidade que reporta.","E) Fornecer informações financeiras sobre a entidade que reporta que sejam úteis a seus usuários primários na tomada de decisões referente à oferta de recursos à entidade."],"g":"E","coment":"O objetivo é fornecer informações financeiras úteis aos usuários primários para decisões relacionadas à oferta de recursos à entidade.","memo":"Objetivo = informação útil + usuários primários + decisões sobre oferta de recursos."},{"topic":"Objetivo do Relatório Financeiro","banca":"FGV – Analista Legislativo – ALERO – Contabilidade – 2026","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta que sejam úteis para os seus principais usuários na tomada de decisões referente à oferta de recursos à entidade.<br><br>O público em geral também pode considerar relatórios financeiros para fins gerais úteis. No entanto, esses relatórios serão direcionados a eles quando são","alts":["A) Credores e reguladores.","B) Investidores e credores.","C) Empregados e administradores.","D) Administradores e investidores.","E) Reguladores e entidades governamentais."],"g":"B","coment":"Os relatórios financeiros para fins gerais são direcionados essencialmente aos usuários primários: investidores, credores por empréstimos e outros credores.","memo":"Usuários primários = investidores + credores."},{"topic":"Objetivo do Relatório Financeiro","banca":"FGV – Assistente Legislativo – ALERO – Técnico em Contabilidade – 2026","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, muitos investidores, credores por empréstimos e outros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais.<br><br>Isso significa que esses usuários","alts":["A) Têm as mesmas necessidades e desejos de informação.","B) Representam a única fonte de financiamento da entidade.","C) Podem exigir que a entidade que reporta forneça informações diretamente a eles.","D) Devem se basear nestes relatórios para muitas das informações financeiras de que necessitam.","E) Recebem informação sobre o montante que representa o valor da entidade por meio destes relatórios."],"g":"D","coment":"Muitos usuários primários não podem exigir informações diretamente da entidade. Por isso, dependem dos relatórios financeiros para fins gerais.","memo":"Usuário primário não exige informação diretamente: usa o relatório."},{"topic":"Objetivo do Relatório Financeiro","banca":"FGV – TNS – ALBA – Ciências Contábeis – 2014","q":"Os investidores, credores por empréstimo e outros credores, existentes e em potencial, representam os usuários primários dos relatórios contábil‐financeiros de propósito geral.<br><br>Neste sentido, assinale a afirmativa correta.","alts":["A) Esses usuários individuais possuem as mesmas necessidades de informação.","B) Esses usuários podem requerer que as entidades, que reportam a informação, prestem as informações de que necessitam, diretamente.","C) Os relatórios contábil‐financeiros de propósito geral devem atender a todas as informações que esses usuários necessitam.","D) Esses usuários precisam considerar informação pertinente de outras fontes, como condições econômicas gerais e expectativas, eventos políticos e clima político, e perspectivas e panorama para a indústria e para a entidade.","E) Os relatórios contábil‐financeiros de propósito geral devem divulgar o valor da entidade que reporta a informação."],"g":"D","coment":"Os relatórios financeiros não fornecem todas as informações necessárias. Os usuários também devem considerar outras fontes pertinentes.","memo":"Relatório financeiro não entrega tudo; o usuário também consulta outras fontes."},{"topic":"Objetivo do Relatório Financeiro","banca":"FGV – AFCTE – SEFAZ AM – 2022","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, muitos investidores, credores por empréstimos e outros credores, existentes e potenciais, não podem exigir que as entidades forneçam informações diretamente a eles, sendo, portanto, os principais usuários aos quais se destinam relatórios financeiros para fins gerais.<br><br>Nesse sentido, em relação aos relatórios financeiros para fins gerais, de acordo com o Pronunciamento, assinale a afirmativa correta.","alts":["A) Destinam-se a apresentar o valor da entidade que reportam.","B) Baseiam-se em representações exatas e precisas do que se propõem a apresentar.","C) São completos, de modo que os usuários não precisam considerar informações de outras fontes.","D) Incluem informações adicionais que são úteis a um subconjunto específico de principais usuários.","E) Não são do interesse da administração da entidade que reporta, uma vez que esta obtém, internamente, as informações financeiras de que precisa."],"g":"D","coment":"A entidade pode incluir informações adicionais úteis a um subconjunto específico de principais usuários. Os relatórios não apresentam o valor da entidade nem são completos.","memo":"Pode haver informação adicional útil a subconjunto de usuários primários."},{"topic":"Características Qualitativas","banca":"FGV – ALERO – Contabilidade – 2018","q":"Assinale a opção que indica as características qualitativas fundamentais.","alts":["A) Confiabilidade e materialidade.","B) Relevância e representação fidedigna.","C) Essência sobre a forma e neutralidade.","D) Comparabilidade e tempestividade.","E) Compreensibilidade e verificabilidade."],"g":"B","coment":"As características qualitativas fundamentais são relevância e representação fidedigna.","memo":"Fundamentais = relevância + representação fidedigna."},{"topic":"Relevância","banca":"FGV – Supervisor – IMBEL – Contador – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, as informações financeiras relevantes são capazes de fazer diferença nas decisões tomadas pelos usuários e podem ter valor preditivo. Em relação às informações financeiras relevantes com valor preditivo, assinale a afirmativa correta.","alts":["A) Confirmam ou alteram avaliações anteriores.","B) Devem servir como prognóstico aos usuários.","C) São empregadas pelos usuários para fazer suas próprias previsões.","D) São utilizadas em processos empregados pelos usuários para analisar resultados passados.","E) Representam uma novidade aos usuários, sendo que eles não teriam conhecimento delas a partir de outras fontes."],"g":"C","coment":"Informação com valor preditivo não é necessariamente uma previsão pronta; ela é usada como insumo para o usuário fazer suas próprias previsões.","memo":"Valor preditivo = insumo para previsões."},{"topic":"Relevância","banca":"FGV – AJ – TJ RO – Contador – 2021","q":"Uma equipe de analistas financeiros estava realizando um processo de análise para conceder fiança a uma entidade requerente. A equipe usou como fontes de informações as demonstrações contábeis individuais e consolidadas dos últimos cinco anos. Na opinião da equipe de analistas, a demonstração dos fluxos de caixa e o balanço patrimonial da entidade foram o que mais influenciou a decisão tomada pela equipe.<br><br>No caso narrado, a característica qualitativa da informação contábil em destaque no trabalho da equipe de analistas foi:","alts":["A) Comparabilidade;","B) Compreensibilidade;","C) Relevância;","D) Representação fidedigna;","E) Tempestividade."],"g":"C","coment":"A informação foi relevante porque influenciou a decisão dos analistas sobre a concessão de fiança.","memo":"Se fez diferença na decisão, a característica é relevância."},{"topic":"Representação Fidedigna","banca":"FGV – CFC – 1º Exame de Suficiência – 2025","q":"Segundo a NBC TG ESTRUTURA CONCEITUAL, para a representação dos relatórios financeiros ser fidedigna ela precisa ser","alts":["A) Completa, neutra e isenta de erros.","B) Confiável, tempestiva e com erros mínimos.","C) Tempestiva, útil e comparável.","D) Consistente, completa e compreensível."],"g":"A","coment":"A representação fidedigna precisa ser completa, neutra e isenta de erros.","memo":"CNI = completa, neutra e isenta de erros."},{"topic":"Tempestividade","banca":"FGV – CFC – 1º Exame de Suficiência – 2025","q":"Um supermercado funciona na região sul do país. Em maio de 2024, devido às fortes chuvas, o supermercado perdeu todo o seu estoque. Nas demonstrações contábeis mensais, em 31/05/24, o supermercado optou por baixar todo o estoque, mesmo sem ter recebido um laudo oficial, de modo a tornar as demonstrações mais úteis aos tomadores de decisões.<br><br>A informação apresenta a seguinte característica qualitativa:","alts":["A) Neutralidade.","B) Materialidade.","C) Verificabilidade.","D) Tempestividade."],"g":"D","coment":"A baixa foi feita para que a informação estivesse disponível em tempo hábil para influenciar decisões. Isso é tempestividade.","memo":"Tempestividade = informação a tempo de decidir."},{"topic":"Tempestividade","banca":"FGV – Perito Criminal – PC PI – Contabilidade ou Economia – 2026","q":"Uma empresa alimentícia realiza as suas entregas interestaduais por meio de um caminhão de carga. Em 10/12/2024, a empresa foi notificada porque o caminhão transportava mais do que o limite local permitido. O prazo para pagamento da multa era de 30 dias e não havia possibilidade de recorrer. Ao realizar a sua Demonstração do Resultado anual, referente a 2024, a empresa decidiu esperar até a finalização do prazo para pagamento da multa para reconhecer a despesa.<br><br>Ao analisar o fato, um perito constatou que não foi atendida a característica qualitativa da","alts":["A) Neutralidade.","B) Tempestividade.","C) Continuidade.","D) Materialidade.","E) Compreensibilidade."],"g":"B","coment":"O fato já ocorreu e afetava o resultado de 2024. Esperar prejudica a informação tempestiva.","memo":"Despesa deve ser reconhecida no tempo certo para manter utilidade."},{"topic":"Comparabilidade","banca":"FGV – Analista Especializado – IMBEL – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, para ajudar os usuários a identificar e avaliar mudanças e tendências, as demonstrações contábeis devem","alts":["A) Detalhar os principais fatos contabilizados nas notas explicativas.","B) Incluir o relatório do auditor em sua publicação.","C) Fornecer informações comparativas de, pelo menos, um período de relatório anterior.","D) Apresentar a Demonstração do Valor Adicionado.","E) Apresentar a remuneração dos membros do Conselho de Administração."],"g":"C","coment":"A comparabilidade permite identificar mudanças e tendências. Por isso, são necessárias informações comparativas.","memo":"Comparabilidade = comparar períodos, empresas e tendências."},{"topic":"Características de Melhoria","banca":"FGV – AFRE ES – SEFAZ ES – 2021","q":"Relacione as características qualitativas de melhoria de informações financeiras úteis às suas respectivas explicações.<br><br>1. Comparabilidade<br>2. Capacidade de verificação<br>3. Tempestividade<br>4. Compreensibilidade<br><br>( ) permite aos usuários identificar e compreender similaridades e diferenças entre itens.<br>( ) implica em classificar, caracterizar e apresentar informações de modo claro e conciso.<br>( ) significa disponibilizar informações aos tomadores de decisões a tempo para que sejam capazes de influenciar suas decisões.<br>( ) ajuda a garantir aos usuários que as informações representem de forma fidedigna os fenômenos econômicos que pretendem representar.<br><br>Assinale a opção que apresenta, segundo a ordem apresentada, a relação correta.","alts":["A) 4 – 2 – 3 – 1.","B) 4 – 3 – 2 – 1.","C) 1 – 2 – 3 – 4.","D) 1 – 4 – 3 – 2.","E) 2 – 4 – 1 – 3."],"g":"D","coment":"Comparabilidade identifica similaridades e diferenças; compreensibilidade exige apresentação clara; tempestividade é disponibilidade a tempo; verificabilidade ajuda a confirmar a representação fidedigna.","memo":"Melhoria: Comparabilidade, Verificabilidade, Tempestividade e Compreensibilidade."},{"topic":"Compreensibilidade","banca":"FGV – Analista Especializado – IMBEL – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, a compreensibilidade é uma das características qualitativas de melhoria de informações financeiras úteis. Em relação às implicações da característica qualitativa da compreensibilidade, assinale a afirmativa correta.","alts":["A) Os usuários devem poder identificar e compreender similaridades e diferenças entre itens.","B) Os fenômenos complexos e de difícil compreensão devem ser excluídos dos relatórios financeiros.","C) As informações devem ser disponibilizadas aos tomadores de decisões a tempo para que sejam capazes de influenciar suas decisões.","D) As informações devem ser evidenciadas de modo que os usuários não precisem buscar o auxílio de consultores para compreender os relatórios financeiros.","E) Os relatórios financeiros devem ser elaborados para usuários que têm conhecimento razoável das atividades comerciais e econômicas e que revisam e analisam as informações de modo diligente."],"g":"E","coment":"A compreensibilidade presume usuários com conhecimento razoável das atividades econômicas e que revisam as informações de modo diligente.","memo":"Compreensibilidade presume usuário diligente; não exclui informação complexa."},{"topic":"Restrição de Custo","banca":"FGV – Analista Especializado – IMBEL – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, assinale a opção que apresenta uma restrição generalizada sobre as informações que podem ser fornecidas em relatório financeiro.","alts":["A) O tempo.","B) O custo.","C) A subjetividade.","D) Os recursos limitados.","E) A quantidade de normas."],"g":"B","coment":"O custo é a restrição generalizada da informação financeira útil.","memo":"Restrição generalizada = custo."},{"topic":"Demonstrações Contábeis","banca":"FGV – Perito – PC AM – 4ª Classe – Contabilidade – 2022","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro, as demonstrações contábeis fornecem informações sobre transações e outros eventos observados do ponto de vista","alts":["A) Dos investidores.","B) Dos credores existentes.","C) Dos credores potenciais.","D) Da entidade que reporta.","E) Das autoridades governamentais."],"g":"D","coment":"As demonstrações contábeis adotam a perspectiva da entidade que reporta como um todo, e não de um grupo específico de usuários.","memo":"Perspectiva das demonstrações = entidade que reporta."},{"topic":"Continuidade Operacional","banca":"FGV – Analista Especializado – IMBEL – 2021","q":"Em relação à entidade que reporta, pode-se presumir, por meio da premissa de continuidade operacional, que","alts":["A) Não tem a necessidade de entrar em liquidação ou deixar de negociar, podendo haver a intenção.","B) Não tem a intenção e nem a necessidade de entrar em liquidação ou deixar de negociar.","C) Não apresentou prejuízo no período corrente.","D) Apresenta perspectiva de lucros futuros.","E) Não tem a intenção de comprar novas empresas."],"g":"B","coment":"A continuidade operacional presume que a entidade não tem intenção nem necessidade de entrar em liquidação ou deixar de negociar.","memo":"Continuidade = sem intenção e sem necessidade de liquidar ou deixar de negociar."},{"topic":"Continuidade Operacional","banca":"FGV – Analista de Controle Interno – Pref. Canaã dos Carajás – 2025","q":"De acordo com a premissa da continuidade operacional, presente na Estrutura Conceitual para Relatório Financeiro, presume-se que a entidade não tem a intenção e nem a necessidade de","alts":["A) Mudar a área ou o local de atuação.","B) Entrar em liquidação ou deixar de negociar.","C) Substituir as suas estratégias financeiras ou operacionais.","D) Captar recursos financeiros de terceiros.","E) Renovar contratos com fornecedores."],"g":"B","coment":"A premissa de continuidade considera que a entidade continuará em operação no futuro previsível, sem intenção ou necessidade de liquidação.","memo":"Continuidade operacional = não liquidar e não parar de negociar."},{"topic":"Continuidade Operacional","banca":"FGV – Analista Legislativo – ALERO – Contabilidade – 2018","q":"As demonstrações contábeis normalmente são elaboradas tendo como premissa que a entidade está em atividade e irá manter-se em operação por um futuro previsível.<br><br>De acordo com o Pronunciamento Conceitual Básico (R1) - Estrutura Conceitual para elaboração e divulgação de relatório contábil financeiro, essa premissa é chamada de","alts":["A) Continuidade.","B) Entidade.","C) Essência sobre a forma.","D) Comparabilidade.","E) Tempestividade."],"g":"A","coment":"A premissa de que a entidade continuará operando no futuro previsível é a continuidade operacional.","memo":"Operação no futuro previsível = continuidade."},{"topic":"Consolidadas e Não Consolidadas","banca":"FGV – CFC – 1º Exame de Suficiência – 2025","q":"De acordo com a NBC TG Estrutura Conceitual- ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, as demonstrações contábeis consolidadas fornecem informações sobre os ativos, passivos, patrimônio líquido, receitas e despesas","alts":["A) Apenas das controladas.","B) Apenas da controladora.","C) Da controladora e de suas controladas, como entidades independentes.","D) Da controladora e de suas controladas, como uma única entidade que reporta."],"g":"D","coment":"As demonstrações consolidadas apresentam controladora e controladas como uma única entidade que reporta.","memo":"Consolidada = controladora + controladas como uma única entidade."},{"topic":"Consolidadas e Não Consolidadas","banca":"FGV – CFC – 1º Exame de Suficiência – 2025","q":"De acordo com a NBC TG Estrutura Conceitual - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, patrimônio líquido é a participação nos ativos da entidade após","alts":["A) A dedução de seus passivos.","B) A dedução de suas despesas.","C) O acréscimo de suas receitas.","D) O acréscimo de seus passivos."],"g":"A","coment":"Patrimônio líquido é a participação residual nos ativos da entidade após a dedução de todos os seus passivos.","memo":"PL = Ativos - Passivos."}],"slides":[{"type":"card","title":"🎯 ESTUDE COMIGO – CPC 00 (R2)","body":"\n<div class=\"grid2\">\n<div class=\"box\"><h2>CURSO DE CONTABILIDADE PROFESSOR MOREIRA</h2><p><span class=\"questaoBadge\">🏆 Somente questões originais da banca FGV</span></p><p><span class=\"autoDestaque\">📚 Total de 22 questões FGV</span></p><p>Conteúdo em formato automático para você estudar junto, como se estivesse em uma trilha guiada.</p></div>\n<div class=\"box\"><h2>📝 Como utilizar este vídeo</h2><p>1️⃣ Leia os Flashcards.</p><p>2️⃣ Responda as questões em uma folha do seu caderno.</p><p>3️⃣ Qualquer coisa, pause o vídeo.</p><p>4️⃣ Veja a correção comentada na continuação do vídeo.</p></div>\n</div>\n<div class=\"memo\">🚀 Quer acelerar sua aprovação? Matricule-se no Curso de Contabilidade Professor Moreira. Mapas mentais, apostilas, questões comentadas, trilhas, simulados e mentoria. 📱 WhatsApp: (61) 98532-3574</div>","klass":""},{"type":"card","title":"🎯 Situação e Finalidade da Estrutura Conceitual","body":"\n<p>A Estrutura Conceitual descreve o objetivo do relatório financeiro para fins gerais e os conceitos que servem de base para sua elaboração.</p>\n<div class=\"memo\">Ela orienta, mas não é Pronunciamento Técnico e não se sobrepõe aos CPCs.</div>\n","klass":""},{"type":"card","title":"🎯 Finalidades","body":"\n<div class=\"grid2\">\n<div class=\"box\"><p>✅ Auxiliar o IASB/CPC a desenvolver normas com base em conceitos consistentes.</p><p>✅ Auxiliar os preparadores quando não houver norma específica ou houver escolha de política contábil.</p></div>\n<div class=\"box\"><p>✅ Auxiliar todos os usuários a entender e interpretar os Pronunciamentos.</p><p>🌍 Convergência internacional: CPC alinhado ao IASB.</p></div>\n</div>","klass":""},{"type":"prepare","qidx":0},{"type":"quiz","qidx":0},{"type":"answer","qidx":0},{"type":"card","title":"📘 Capítulo 1 — Objetivo do Relatório Financeiro","body":"\n<p>O objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta, úteis aos usuários primários na tomada de decisões sobre a oferta de recursos à entidade.</p>\n<div class=\"memo\">Usuários primários: investidores, credores por empréstimos e outros credores, existentes e potenciais.</div>\n","klass":""},{"type":"card","title":"👥 Usuários e Limitações","body":"\n<div class=\"grid2\">\n<div class=\"box\"><h2>Usuários primários</h2><p>Precisam avaliar valor, época e incerteza dos fluxos de caixa futuros e a gestão dos recursos pela administração.</p></div>\n<div class=\"box\"><h2>Limitações</h2><p>Relatórios financeiros não fornecem todas as informações, não apresentam o valor exato da entidade e envolvem estimativas, julgamentos e modelos.</p></div>\n</div>","klass":""},{"type":"prepare","qidx":1},{"type":"quiz","qidx":1},{"type":"answer","qidx":1},{"type":"prepare","qidx":2},{"type":"quiz","qidx":2},{"type":"answer","qidx":2},{"type":"prepare","qidx":3},{"type":"quiz","qidx":3},{"type":"answer","qidx":3},{"type":"prepare","qidx":4},{"type":"quiz","qidx":4},{"type":"answer","qidx":4},{"type":"prepare","qidx":5},{"type":"quiz","qidx":5},{"type":"answer","qidx":5},{"type":"card","title":"📊 Recursos, Reivindicações e Alterações","body":"\n<p>Os relatórios financeiros fornecem informações sobre recursos econômicos, reivindicações contra a entidade e alterações nesses recursos e reivindicações.</p>\n<div class=\"memo\">Ativos = recursos econômicos. Passivos e PL = reivindicações. Receitas e despesas = alterações que refletem desempenho.</div>\n","klass":""},{"type":"card","title":"⭐ Capítulo 2 — Características Qualitativas","body":"\n<div class=\"grid2\">\n<div class=\"box\"><h2>Fundamentais</h2><p>✅ Relevância</p><p>✅ Representação fidedigna</p></div>\n<div class=\"box\"><h2>De melhoria</h2><p>✅ Comparabilidade</p><p>✅ Verificabilidade</p><p>✅ Tempestividade</p><p>✅ Compreensibilidade</p></div>\n</div>","klass":""},{"type":"prepare","qidx":6},{"type":"quiz","qidx":6},{"type":"answer","qidx":6},{"type":"card","title":"🎯 Relevância","body":"\n<p>A informação é relevante quando é capaz de fazer diferença nas decisões dos usuários.</p>\n<div class=\"memo\">Pode ter valor preditivo, valor confirmatório ou ambos.</div>\n","klass":""},{"type":"prepare","qidx":7},{"type":"quiz","qidx":7},{"type":"answer","qidx":7},{"type":"prepare","qidx":8},{"type":"quiz","qidx":8},{"type":"answer","qidx":8},{"type":"card","title":"🛡️ Representação Fidedigna","body":"\n<p>Para ser fidedigna, a representação deve ser:</p>\n<div class=\"memo\">✅ Completa &nbsp;&nbsp; ✅ Neutra &nbsp;&nbsp; ✅ Isenta de erros</div>\n","klass":""},{"type":"prepare","qidx":9},{"type":"quiz","qidx":9},{"type":"answer","qidx":9},{"type":"card","title":"⏰ Tempestividade, Comparabilidade e Compreensibilidade","body":"\n<div class=\"grid2\"><div class=\"box\"><h2>Tempestividade</h2><p>Informação disponível a tempo de influenciar decisões.</p><h2>Comparabilidade</h2><p>Permite identificar similaridades, diferenças, mudanças e tendências.</p></div>\n<div class=\"box\"><h2>Compreensibilidade</h2><p>Classificar, caracterizar e apresentar de modo claro e conciso.</p><h2>Verificabilidade</h2><p>Ajuda a assegurar que a informação representa fielmente o fenômeno.</p></div></div>\n","klass":""},{"type":"prepare","qidx":10},{"type":"quiz","qidx":10},{"type":"answer","qidx":10},{"type":"prepare","qidx":11},{"type":"quiz","qidx":11},{"type":"answer","qidx":11},{"type":"prepare","qidx":12},{"type":"quiz","qidx":12},{"type":"answer","qidx":12},{"type":"prepare","qidx":13},{"type":"quiz","qidx":13},{"type":"answer","qidx":13},{"type":"prepare","qidx":14},{"type":"quiz","qidx":14},{"type":"answer","qidx":14},{"type":"card","title":"💰 Restrição de Custo","body":"\n<p>O custo é uma restrição generalizada sobre o relatório financeiro útil.</p>\n<div class=\"memo\">A informação deve gerar benefícios que justifiquem os custos de prepará-la, divulgá-la, auditar e analisá-la.</div>\n","klass":""},{"type":"prepare","qidx":15},{"type":"quiz","qidx":15},{"type":"answer","qidx":15},{"type":"card","title":"🏢 Capítulo 3 — Demonstrações Contábeis","body":"\n<p>As demonstrações contábeis são uma forma específica de relatórios financeiros para fins gerais.</p>\n<p>Elas fornecem informações sobre ativos, passivos, patrimônio líquido, receitas e despesas da entidade que reporta.</p>\n<div class=\"memo\">O objetivo é ajudar na avaliação de fluxos de caixa futuros e da gestão de recursos pela administração.</div>\n","klass":""},{"type":"card","title":"📌 Objetivo, Alcance e Perspectiva","body":"\n<div class=\"grid2\">\n<div class=\"box\"><h2>Onde aparecem?</h2><p>BP: ativos, passivos e PL.</p><p>DRE/DRA: receitas e despesas.</p><p>Notas: riscos, fluxos de caixa, métodos, premissas e julgamentos.</p></div>\n<div class=\"box\"><h2>Perspectiva</h2><p>Ponto de vista da entidade que reporta como um todo, e não de um grupo específico de investidores ou credores.</p></div>\n</div>\n","klass":""},{"type":"prepare","qidx":16},{"type":"quiz","qidx":16},{"type":"answer","qidx":16},{"type":"card","title":"🔄 Continuidade Operacional","body":"\n<p>As demonstrações contábeis normalmente são elaboradas com base na suposição de que a entidade continuará em operação no futuro previsível.</p>\n<div class=\"memo\">Presume-se que não há intenção nem necessidade de liquidar ou deixar de negociar.</div>\n","klass":""},{"type":"prepare","qidx":17},{"type":"quiz","qidx":17},{"type":"answer","qidx":17},{"type":"prepare","qidx":18},{"type":"quiz","qidx":18},{"type":"answer","qidx":18},{"type":"prepare","qidx":19},{"type":"quiz","qidx":19},{"type":"answer","qidx":19},{"type":"card","title":"🏛️ Entidade que Reporta","body":"\n<p>A entidade que reporta é aquela que é obrigada a, ou decide, elaborar demonstrações contábeis.</p>\n<div class=\"memo\">Ela pode ser uma única entidade, parte de uma entidade ou compreender mais de uma entidade. Não precisa ser entidade legal.</div>\n","klass":""},{"type":"card","title":"🏢 Demonstrações Consolidadas, Não Consolidadas e Combinadas","body":"\n<div class=\"grid2\">\n<div class=\"box\"><h2>Consolidadas</h2><p>Controladora + controladas como uma única entidade que reporta.</p></div>\n<div class=\"box\"><h2>Não consolidadas / combinadas</h2><p>Não consolidadas: apenas a controladora. Combinadas: duas ou mais entidades sem que todas estejam vinculadas por controle.</p></div>\n</div>\n","klass":""},{"type":"prepare","qidx":20},{"type":"quiz","qidx":20},{"type":"answer","qidx":20},{"type":"prepare","qidx":21},{"type":"quiz","qidx":21},{"type":"answer","qidx":21},{"type":"card","title":"🏆 Parabéns por concluir a trilha FGV!","body":"<div class=\"memo\">📚 Contabilidade se aprende resolvendo questões.</div><div class=\"grid2\"><div class=\"box\"><h2>Continue estudando</h2><p>✅ Mapas Mentais</p><p>✅ Apostilas em PDF</p><p>✅ Questões Comentadas</p><p>✅ Simulados e Mentoria</p></div><div class=\"box\"><h2>📱 Matrículas</h2><p><b>Curso de Contabilidade Professor Moreira</b></p><p>WhatsApp: <b>(61) 98532-3574</b></p></div></div>","klass":""},{"type":"summary"},{"type":"finalQuestions"},{"type":"wrongReview"}]};

function fmtSeg(seg){
  const m = String(Math.floor(seg/60)).padStart(2,'0');
  const s = String(seg%60).padStart(2,'0');
  return m+":"+s;
}

function duracaoAuto(t){
  return TEMPOS_AUTO[t.type] || 8;
}

function limparTimersAuto(){
  clearTimeout(autoTimeout);
  clearInterval(autoInterval);
  autoTimeout = null;
  autoInterval = null;
}

function atualizarPainelAuto(){
  const modo=document.getElementById("autoModo");
  const tempo=document.getElementById("autoTempo");
  const bar=document.getElementById("autoBar");
  const painel=document.getElementById("autoPanel");
  if(!modo || !tempo) return;
  if(autoAtivo){
    modo.innerHTML = autoPausado ? "⏸ Pausado" : "🔴 Estude comigo automático";
    painel.classList.toggle("gravandoPulse", !autoPausado);
  }else{
    modo.innerHTML = "🎬 Modo manual";
    painel.classList.remove("gravandoPulse");
  }
  tempo.innerHTML = autoAtivo ? "⏳ Tela: "+fmtSeg(Math.max(0,autoRestante)) : "⏳ Tela: --";
  if(bar){
    const perc = autoDuracaoAtual ? Math.max(0, Math.min(100, ((autoDuracaoAtual-autoRestante)/autoDuracaoAtual)*100)) : 0;
    bar.style.width = perc+"%";
  }
}

function iniciarGravacao(){
  limparTimersAuto();
  atual=0;
  respostas={};
  inicioTempo=Date.now();
  autoAtivo=true;
  autoPausado=false;
  render();
}

function pararAuto(){
  autoAtivo=false;
  autoPausado=false;
  limparTimersAuto();
  atualizarPainelAuto();
}

function alternarPausa(){
  if(!autoAtivo) return;
  autoPausado = !autoPausado;
  if(autoPausado){
    limparTimersAuto();
    atualizarPainelAuto();
  }else{
    agendarAuto();
  }
}

function agendarAuto(){
  if(!autoAtivo || autoPausado) return;
  limparTimersAuto();
  const t=DATA.slides[atual];
  autoDuracaoAtual = autoRestante || duracaoAuto(t);
  autoRestante = autoDuracaoAtual;
  atualizarPainelAuto();

  if(t.type==="quiz"){
    // Mostra a alternativa correta antes de passar para a resposta comentada.
    setTimeout(()=>{
      if(autoAtivo && !autoPausado && DATA.slides[atual] && DATA.slides[atual].type==="quiz"){
        marcarCorretaAutomatico(DATA.slides[atual].qidx);
      }
    }, Math.max(1,(autoDuracaoAtual-7))*1000);
  }

  autoInterval=setInterval(()=>{
    if(!autoAtivo || autoPausado) return;
    autoRestante--;
    atualizarPainelAuto();
    if(autoRestante<=0){
      limparTimersAuto();
      if(INDICE_FINAL_AUTO<0) INDICE_FINAL_AUTO = DATA.slides.findIndex(s=>s.type==="summary");
      if(atual>=INDICE_FINAL_AUTO && DATA.slides[atual].type==="summary"){
        pararAuto();
        return;
      }
      if(atual<DATA.slides.length-1){
        atual++;
        autoRestante=0;
        render();
      }else{
        pararAuto();
      }
    }
  },1000);
}

function marcarCorretaAutomatico(qidx){
  const q=DATA.questions[qidx];
  const idx = q.alts.findIndex(a=>letraFromAlt(a)===q.g);
  if(idx>=0){
    respostas[qidx]={i:idx,ok:true};
    mostrarRespostaMarcada(qidx,idx,true);
    const f=document.getElementById("feedback");
    if(f){
      f.className="feedback ok";
      f.innerHTML="⏰ Tempo encerrado! A resposta correta está marcada em verde. Em instantes vem o comentário.";
    }
    updateStats();
  }
}

function formatTime(ms){
  const s = Math.floor(ms/1000);
  const h = String(Math.floor(s/3600)).padStart(2,'0');
  const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return h+":"+m+":"+ss;
}

function updateStats(){
  const totalRespondidas = Object.keys(respostas).length;
  const acertos = Object.values(respostas).filter(r=>r.ok).length;
  const erros = totalRespondidas - acertos;
  const perc = totalRespondidas ? Math.round(acertos/totalRespondidas*100) : 0;
  document.getElementById("stats").innerHTML = `🏆 FGV OFICIAL • ${DATA.questions.length} questões`;
}
cronometro = setInterval(updateStats,1000);

function render(){
 const t=DATA.slides[atual];
 document.getElementById("contador").innerText=(atual+1)+"/"+DATA.slides.length;
 const c=document.getElementById("conteudo");
 if(t.type==="card"){
   c.innerHTML=`<h1>${t.title}</h1>${t.body}`;
 }
 if(t.type==="prepare"){
   const q=DATA.questions[t.qidx];
   c.innerHTML=`<div class="prepareTela"><h1>🧠 PREPARE-SE!</h1><p>⏳ Tente resolver sem olhar a resposta.</p><p>✍️ Anote sua resposta no caderno.</p><div class="numero">🏆 FGV OFICIAL • CPC 00 (R2) • Questão ${t.qidx+1} de ${DATA.questions.length}</div></div>`;
 }
 if(t.type==="quiz"){
   const q=DATA.questions[t.qidx];
   c.innerHTML=`<div class="questao-meta">🏆 FGV OFICIAL • CPC 00 (R2) • QUESTÃO ${t.qidx+1} DE ${DATA.questions.length}</div><div class="questao-meta">${q.banca}</div>
   <div class="questao-texto">${q.q}</div>
   <div class="alternativas">
     ${q.alts.map((a,i)=>`<button class="altBtn" onclick="responder(${t.qidx},${i})">${a}</button>`).join("")}
   </div>
   <div class="pensarBox">🧠 Pense na resposta. A alternativa correta aparecerá automaticamente antes do comentário.</div><div class="feedback" id="feedback"></div>`;
   if(respostas[t.qidx]) mostrarRespostaMarcada(t.qidx, respostas[t.qidx].i, false);
 }
 if(t.type==="answer"){
   const q=DATA.questions[t.qidx];
   c.innerHTML=`<h1>RESPOSTA COMENTADA — QUESTÃO ${t.qidx+1} DE ${DATA.questions.length}</h1>
   <div class="resposta"><h2>✅ Gabarito: ${q.g}</h2><p>${q.coment}</p></div>
   <div class="memo">💡 Cartão-memória: ${q.memo}</div>`;
 }
 if(t.type==="summary"){
   const total = Object.keys(respostas).length;
   const acertos = Object.values(respostas).filter(r=>r.ok).length;
   const erros = total - acertos;
   const perc = total ? Math.round(acertos/total*100) : 0;
   c.innerHTML=`<h1>🏁 Trilha FGV concluída!</h1>
   <div class="grid2"><div class="box"><h2>Resumo do vídeo</h2><p>📚 Questões FGV: <b>${DATA.questions.length}</b></p><p>📘 Tema: <b>CPC 00 (R2)</b></p><p>🧠 Método: <b>flashcard + questão + correção comentada</b></p></div>
   <div class="memo">🏆 Parabéns por estudar até o final! Contabilidade se aprende resolvendo questões. Matrículas: WhatsApp (61) 98532-3574.</div></div>`;
 }
 if(t.type==="finalQuestions"){
   c.innerHTML=`<h1>📚 Revisão Final — Todas as Questões</h1><p><b>Resolva novamente, sem consultar o gabarito.</b></p><div class="final-lista">${DATA.questions.map((q,i)=>`
    <div class="final-q"><h3>QUESTÃO ${i+1} — ${q.banca}</h3><div>${q.q}</div><div>${q.alts.map(a=>`<p><b>${a}</b></p>`).join("")}</div></div>`).join("")}</div>`;
 }
 if(t.type==="wrongReview"){
   const wrong = Object.keys(respostas).filter(k=>!respostas[k].ok).map(k=>Number(k));
   c.innerHTML=`<h1>📌 Revisão das Erradas</h1>` + (wrong.length===0 ? 
   `<div class="memo">Parabéns! Você não registrou erros nas questões respondidas.</div>` :
   `<p><b>Questões que você errou:</b> ${wrong.map(i=>i+1).join(", ")}</p><div class="final-lista">${wrong.map(i=>{const q=DATA.questions[i]; return `<div class="final-q"><h3>QUESTÃO ${i+1} — ${q.banca}</h3><div>${q.q}</div><div>${q.alts.map(a=>`<p><b>${a}</b></p>`).join("")}</div><div class="memo">💡 ${q.memo}</div></div>`}).join("")}</div>`);
 }
 redimensionarCanvas();
 carregarAnotacao();
 updateStats();
 restaurarPainelImagemDaTela();
 if(autoAtivo){
   setTimeout(()=>{
     if(autoAtivo && !autoPausado) agendarAuto();
   }, 80);
 }
}

function responder(qidx, i){
  const q=DATA.questions[qidx];
  const escolhido = letraFromAlt(q.alts[i]);
  const ok = escolhido === q.g;
  respostas[qidx]={i,ok};
  mostrarRespostaMarcada(qidx,i,true);
  updateStats();
}

function mostrarRespostaMarcada(qidx, i, animar){
  const q=DATA.questions[qidx];
  const btns=[...document.querySelectorAll(".altBtn")];
  btns.forEach((b,idx)=>{
    b.disabled=true;
    const letra=letraFromAlt(q.alts[idx]);
    if(letra===q.g) b.classList.add("correta");
    if(idx===i && letra!==q.g) b.classList.add("errada");
    if(idx!==i && letra!==q.g) b.classList.add("neutra");
  });
  const f=document.getElementById("feedback");
  if(f){
    f.className = "feedback " + (respostas[qidx].ok ? "ok" : "no");
    f.innerHTML = respostas[qidx].ok ? "✅ Correto! Clique em Próximo para ver a resposta comentada." : "❌ Errado. A alternativa correta ficou marcada em verde. Clique em Próximo para ver a explicação.";
  }
}




function salvarAnotacao(){
  try{
    anotacoes[atual] = canvas.toDataURL("image/png");
  }catch(e){}
}

function apagarCanvasAtual(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function carregarAnotacao(){
  apagarCanvasAtual();
  const imgData = anotacoes[atual];
  if(!imgData) return;
  const img = new Image();
  img.onload = function(){
    apagarCanvasAtual();
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
  };
  img.src = imgData;
}

function proximo(){
  if(autoAtivo){pararAuto();}
  salvarAnotacao();
  if(atual<DATA.slides.length-1){
    atual++;
    render();
  }
}

function voltar(){
  if(autoAtivo){pararAuto();}
  salvarAnotacao();
  if(atual>0){
    atual--;
    render();
  }
}

function reiniciar(){
 pararAuto();
 atual=0;
 respostas={};
 inicioTempo=Date.now();
 anotacoes={};
 imagens={};
 painelImagemAberto={};
 painelImagemFixo={};
 fecharPainelImagem();
 apagarCanvasAtual();
 render();
}

function irRevisarErradas(){
 if(autoAtivo){pararAuto();}
 salvarAnotacao();
 const idx = DATA.slides.findIndex(s=>s.type==="wrongReview");
 if(idx>=0){
   atual=idx;
   render();
 }
}



function abrirPainelImagem(){
  const p=document.getElementById("painelImagem");
  p.style.display="block";
  painelImagemAberto[atual]=true;
  renderizarImagemTela();
}

function fecharPainelImagem(){
  const p=document.getElementById("painelImagem");
  if(p) p.style.display="none";
  painelImagemAberto[atual]=false;
  // A imagem não é apagada. O botão fechar apenas esconde o painel.
}

function fixarPainelImagem(){
  painelImagemFixo[atual]=!painelImagemFixo[atual];
  painelImagemAberto[atual]=painelImagemFixo[atual] || true;
  atualizarEstadoPainelImagem();
}

function atualizarEstadoPainelImagem(){
  const p=document.getElementById("painelImagem");
  if(!p) return;
  if(painelImagemFixo[atual]){
    p.classList.add("fixo");
  }else{
    p.classList.remove("fixo");
  }
}

function carregarImagemTela(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    imagens[atual]=e.target.result;        // imagem salva somente nesta tela
    painelImagemAberto[atual]=true;
    abrirPainelImagem();
    renderizarImagemTela();
  };
  reader.readAsDataURL(file);
  event.target.value="";
}

function renderizarImagemTela(){
  const area=document.getElementById("imgArea");
  if(!area) return;
  atualizarEstadoPainelImagem();
  if(imagens[atual]){
    area.innerHTML=`<img src="${imagens[atual]}" alt="Imagem da tela">`;
  }else{
    area.innerHTML=`Clique em <b>🖼️ Imagem</b><br>para inserir uma figura nesta tela.`;
  }
}

function removerImagemTela(){
  delete imagens[atual];
  renderizarImagemTela();
}

function restaurarPainelImagemDaTela(){
  const p=document.getElementById("painelImagem");
  if(!p) return;
  // Se a tela tem imagem, o painel fica salvo e reaparece automaticamente ao voltar para ela.
  // Se foi fixado, também reaparece.
  if(imagens[atual] || painelImagemFixo[atual] || painelImagemAberto[atual]){
    p.style.display="block";
  }else{
    p.style.display="none";
  }
  renderizarImagemTela();
}

/* WACOM / CANVAS — cores + régua + tinta individual por tela */
const canvas=document.getElementById("canvasAnotacao");
const ctx=canvas.getContext("2d");
let desenhando=false;
let wacomAtiva=false;
let anotacoes={};
let imagens={};
let painelImagemAberto={};
let painelImagemFixo={};
let corAtual="#111827";
let ferramenta="caneta";
let inicioLinha=null;
let imagemAntesLinha=null;

function redimensionarCanvas(){
 const rect=document.getElementById("slide").getBoundingClientRect();
 canvas.width=rect.width;
 canvas.height=rect.height;
 ctx.lineCap="round";
 ctx.lineJoin="round";
}

window.addEventListener("resize",()=>{
  salvarAnotacao();
  redimensionarCanvas();
  carregarAnotacao();
});

function abrirCaneta(){
 redimensionarCanvas();
 carregarAnotacao();
 wacomAtiva=true;
 canvas.style.display="block";
 canvas.style.pointerEvents="auto";
 document.getElementById("painelCaneta").style.display="flex";
 document.getElementById("dicaCaneta").style.display="block";
 modoCaneta();
}

function sairCaneta(){
 salvarAnotacao();
 wacomAtiva=false;
 desenhando=false;
 canvas.style.display="block";
 canvas.style.pointerEvents="none";
 document.getElementById("painelCaneta").style.display="none";
 document.getElementById("dicaCaneta").style.display="none";
 carregarAnotacao();
}

function setCor(cor){
 corAtual=cor;
 modoCaneta();
}

function modoCaneta(){
 ferramenta="caneta";
 ctx.globalCompositeOperation="source-over";
 ctx.strokeStyle=corAtual;
 ctx.lineWidth=4;
 ctx.setLineDash([]);
 document.getElementById("dicaCaneta").innerText="✍️ Caneta livre ativada";
}

function modoRegua(){
 ferramenta="regua";
 ctx.globalCompositeOperation="source-over";
 ctx.strokeStyle=corAtual;
 ctx.lineWidth=4;
 ctx.setLineDash([]);
 document.getElementById("dicaCaneta").innerText="📏 Régua ativada: arraste para traçar linha reta";
}

function modoBorracha(){
 ferramenta="borracha";
 ctx.globalCompositeOperation="destination-out";
 ctx.lineWidth=24;
 ctx.setLineDash([]);
 document.getElementById("dicaCaneta").innerText="🧽 Borracha ativada";
}

function limparCanvas(salvar=true){
 apagarCanvasAtual();
 if(salvar) anotacoes[atual] = "";
}

function pos(e){
 const r=canvas.getBoundingClientRect();
 const p=e.touches?e.touches[0]:e;
 return {x:p.clientX-r.left,y:p.clientY-r.top};
}

function inicio(e){
 if(!wacomAtiva) return;
 desenhando=true;
 const p=pos(e);

 if(ferramenta==="regua"){
   inicioLinha=p;
   try{ imagemAntesLinha=ctx.getImageData(0,0,canvas.width,canvas.height); }catch(err){ imagemAntesLinha=null; }
   e.preventDefault();
   return;
 }

 ctx.beginPath();
 ctx.moveTo(p.x,p.y);
 e.preventDefault();
}

function mover(e){
 if(!wacomAtiva || !desenhando) return;
 const p=pos(e);

 if(ferramenta==="regua"){
   if(imagemAntesLinha) ctx.putImageData(imagemAntesLinha,0,0);
   ctx.globalCompositeOperation="source-over";
   ctx.strokeStyle=corAtual;
   ctx.lineWidth=4;
   ctx.setLineDash([10,6]);
   ctx.beginPath();
   ctx.moveTo(inicioLinha.x,inicioLinha.y);
   ctx.lineTo(p.x,p.y);
   ctx.stroke();
   ctx.setLineDash([]);
   e.preventDefault();
   return;
 }

 ctx.lineTo(p.x,p.y);
 ctx.stroke();
 e.preventDefault();
}

function fim(e){
 if(!desenhando) return;

 if(ferramenta==="regua"){
   const p = e && (e.changedTouches || e.clientX) ? pos(e.changedTouches ? {touches:e.changedTouches} : e) : inicioLinha;
   if(imagemAntesLinha) ctx.putImageData(imagemAntesLinha,0,0);
   ctx.globalCompositeOperation="source-over";
   ctx.strokeStyle=corAtual;
   ctx.lineWidth=4;
   ctx.setLineDash([]);
   ctx.beginPath();
   ctx.moveTo(inicioLinha.x,inicioLinha.y);
   ctx.lineTo(p.x,p.y);
   ctx.stroke();
   inicioLinha=null;
   imagemAntesLinha=null;
 }

 desenhando=false;
 salvarAnotacao();
}

canvas.addEventListener("mousedown",inicio);
canvas.addEventListener("mousemove",mover);
canvas.addEventListener("mouseup",fim);
canvas.addEventListener("mouseleave",fim);
canvas.addEventListener("touchstart",inicio,{passive:false});
canvas.addEventListener("touchmove",mover,{passive:false});
canvas.addEventListener("touchend",fim);
render();
setTimeout(()=>{ iniciarGravacao(); }, 700);
</script>
