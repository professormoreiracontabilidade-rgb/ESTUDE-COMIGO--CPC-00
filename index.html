<script>
const DATA = {"questions":[{"num":1,"meta":"FGV – AnA (FunSaúde CE) – FunSaúde CE – Contabilidade – 2021","q":"Com relação à finalidade da Estrutura Conceitual da Contabilidade, de acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, analise as afirmativas a seguir. I. Auxiliar o desenvolvimento das normas internacionais de contabilidade, para que tenham base em conceitos consistentes. II. Auxiliar os usuários a interpretar e entender os pronunciamentos técnicos. III. Auxiliar os responsáveis pela elaboração dos relatórios financeiros a desenvolver políticas contábeis consistentes. São finalidades da Estrutura Conceitual da Contabilidade o que se afirma em","alts":["A) I, apenas.","B) II, apenas.","C) III, apenas.","D) II e III, apenas.","E) I, II e III."],"g":"E","topic":"situação e finalidade","chapter":"CPC 00 (R2) — Revisão Integrada","memo":"Finalidades da Estrutura Conceitual: auxiliar normas consistentes, políticas contábeis e interpretação dos Pronunciamentos.","coment":"A alternativa correta é <b>E</b> — I, II e III.. A questão cobra conceito da Estrutura Conceitual. A alternativa correta é a que melhor preserva a utilidade da informação contábil-financeira."},{"num":2,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"De acordo com a NBC TG Estrutura Conceitual-Estrutura Conceitual para Relatório Financeiro, entre as finalidades da Estrutura Conceitual está","alts":["A) compatibilizar as normas contábeis com as tributárias.","B) indicar aos usuários a melhor estratégia de alocação de recursos.","C) determinar a adoção da melhor política contábil relacionada a uma transação.","D) alterar o texto de um pronunciamento contábil já emitido quando forem verificadas possibilidades de melhoria.","E) auxiliar o desenvolvimento das normas internacionais de contabilidade para que tenham base em conceitos consistentes."],"g":"E","topic":"situação e finalidade","chapter":"CPC 00 (R2) — Revisão Integrada","memo":"Uma finalidade expressa é auxiliar o desenvolvimento das normas internacionais de contabilidade com base em conceitos consistentes.","coment":"A alternativa correta é <b>E</b> — auxiliar o desenvolvimento das normas internacionais de contabilidade para que tenham base em conceitos consistentes.. A questão cobra conceito da Estrutura Conceitual. A alternativa correta é a que melhor preserva a utilidade da informação contábil-financeira."},{"num":3,"meta":"FGV – Prof NS (SES MT) – SES MT – Contador – 2024","q":"A Estrutura Conceitual para Relatório Financeiro, de acordo com o CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, estabelece a base para pronunciamentos que contribuem para a eficiência econômica. Para os negócios, há redução no custo do capital, por conta","alts":["A) da quebra de barreiras entre os países.","B) da adoção de normas de auditoria mais rigorosas.","C) do uso de linguagem de contabilidade única e confiável.","D) do estímulo do intercâmbio entre profissionais da contabilidade."],"g":"C","topic":"situação e finalidade","chapter":"CPC 00 (R2) — Revisão Integrada","memo":"A Estrutura Conceitual contribui para eficiência econômica ao favorecer uma linguagem contábil única e confiável.","coment":"A alternativa correta é <b>C</b> — do uso de linguagem de contabilidade única e confiável.. A questão cobra conceito da Estrutura Conceitual. A alternativa correta é a que melhor preserva a utilidade da informação contábil-financeira."},{"num":4,"meta":"FGV – Ana Prev (MACAEPREV) – MACAEPREV – Contabilidade – 2024","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, a Estrutura Conceitual estabelece a base para normas que reforçam a prestação de contas, reduzindo a lacuna de informações entre","alts":["A) o Governo e os órgãos reguladores.","B) os órgãos reguladores e os elaboradores das demonstrações contábeis.","C) os provedores de capital e as pessoas a quem confiaram o seu dinheiro.","D) as entidades que elaboram o relatório financeiro e a auditoria externa.","E) a auditoria externa e o público a que se destina o relatório financeiro."],"g":"C","topic":"situação e finalidade","chapter":"CPC 00 (R2) — Revisão Integrada","memo":"A prestação de contas reduz a lacuna de informações entre provedores de capital e quem administra os recursos confiados.","coment":"A alternativa correta é <b>C</b> — os provedores de capital e as pessoas a quem confiaram o seu dinheiro.. A questão cobra conceito da Estrutura Conceitual. A alternativa correta é a que melhor preserva a utilidade da informação contábil-financeira."},{"num":5,"meta":"FGV – Analista Legislativo (ALERO) – ALERO – Contabilidade – 2026","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta que sejam úteis para os seus principais usuários na tomada de decisões referente à oferta de recursos à entidade. O público em geral também pode considerar relatórios financeiros para fins gerais úteis. No entanto, esses relatórios serão direcionados a eles quando são","alts":["A) credores e reguladores.","B) investidores e credores.","C) empregados e administradores.","D) administradores e investidores.","E) reguladores e entidades governamentais."],"g":"B","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Relatório financeiro não entrega o valor exato da entidade; ele ajuda o usuário a estimar esse valor.","coment":"A alternativa correta é <b>B</b> — investidores e credores.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":6,"meta":"FGV – Assistente Legislativo (ALERO) – ALERO – Técnico em Contabilidade – 2026","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, muitos investidores, credores por empréstimos e outros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Isso significa que esses usuários","alts":["A) têm as mesmas necessidades e desejos de informação.","B) representam a única fonte de financiamento da entidade.","C) podem exigir que a entidade que reporta forneça informações diretamente a eles.","D) devem se basear nestes relatórios para muitas das informações financeiras de que necessitam.","E) recebem informação sobre o montante que representa o valor da entidade por meio destes relatórios."],"g":"D","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"A administração usa informações internas; não depende dos relatórios financeiros para fins gerais.","coment":"A alternativa correta é <b>D</b> — devem se basear nestes relatórios para muitas das informações financeiras de que necessitam.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":7,"meta":"FGV – Analista Judiciário TRT24 – TRT 24 – Administrativa – Contabilidade – 2025","q":"De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta que sejam úteis para os seus principais usuários na tomada de decisões. Entre estas decisões está","alts":["A) reter ou distribuir o resultado obtido.","B) expandir ou retrair os negócios perante uma crise.","C) aumentar ou manter o preço de venda dos produtos e serviços.","D) adotar estratégias agressivas ou conservadoras na gestão do capital circulante.","E) comprar, vender ou manter instrumento de patrimônio e de dívida."],"g":"E","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Usuários primários: investidores, credores por empréstimos e outros credores, existentes e potenciais.","coment":"A alternativa correta é <b>E</b> — comprar, vender ou manter instrumento de patrimônio e de dívida.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":8,"meta":"FGV – ACE (TCE-GO) – TCE GO – Ciências Contábeis – 2024","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, a Estrutura Conceitual estabelece a base para pronunciamentos que contribuem para a eficiência econômica, ajudando os investidores a","alts":["A) conhecer talentos globalmente, aprimorando a qualidade de mão de obra.","B) identificar oportunidades e riscos em todo o mundo, melhorando a alocação de capital.","C) aumentar o conhecimento em relação a seus investimentos, diminuindo o risco de oportunidade.","D) receber informações e relatórios com maior velocidade, aumentando a agilidade em suas escolhas.","E) melhorar a comunicação com as suas investidas, desenvolvendo um relacionamento mais vantajoso."],"g":"B","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Decisões dos usuários: comprar, vender, manter, conceder crédito ou influenciar a administração.","coment":"A alternativa correta é <b>B</b> — identificar oportunidades e riscos em todo o mundo, melhorando a alocação de capital.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":9,"meta":"FGV – Prof NS (SES MT) – SES MT – Contador – 2024","q":"De acordo com o CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro, as demonstrações contábeis fornecem informações sobre transações e outros eventos observados do ponto de vista dos(a)","alts":["A) acionistas minoritários.","B) entidade que reporta como um todo.","C) usuários, em geral.","D) investidores e credores por empréstimos, existentes ou potenciais."],"g":"B","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Usuários primários: investidores, credores por empréstimos e outros credores, existentes e potenciais.","coment":"A alternativa correta é <b>B</b> — entidade que reporta como um todo.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":10,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, os principais usuários aos quais se destinam os relatórios financeiros para fins gerais são representados por","alts":["A) empregados, clientes e fornecedores.","B) detentores de participação societária e interessados em adquiri-la.","C) população em geral, impactada direta e indiretamente pelos relatórios.","D) investidores, credores por empréstimos e outros credores, existentes e potenciais."],"g":"D","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Usuários primários: investidores, credores por empréstimos e outros credores, existentes e potenciais.","coment":"A alternativa correta é <b>D</b> — investidores, credores por empréstimos e outros credores, existentes e potenciais.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":11,"meta":"FGV – ATTM (Pref Nova Iguaçu) – Pref Nova Iguaçu – 2024","q":"Os investidores, credores por empréstimos e outros credores existentes e potenciais são considerados os usuários principais, aos quais se destinam relatórios financeiros para fins gerais. De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, a administração da entidade não é considerada usuário principal, uma vez que","alts":["A) tem como foco os relatórios gerenciais.","B) apresenta, em geral, alta rotatividade.","C) reporta-se diretamente aos diretores da entidade.","D) pode obter internamente as informações financeiras de que precisa.","E) não representa uma provedora de recursos essenciais para a sobrevivência da entidade."],"g":"D","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"A administração usa informações internas; não depende dos relatórios financeiros para fins gerais.","coment":"A alternativa correta é <b>D</b> — pode obter internamente as informações financeiras de que precisa.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":12,"meta":"FGV – AGP (Pref Vitória) – Pref Vitória – Contador – 2024","q":"De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos, e outros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Em relação às informações fornecidas por estes relatórios aos usuários primários, é correto afirmar que os relatórios","alts":["A) fornecem todas as informações de que esses usuários necessitam.","B) buscam fornecer todas as informações de que esses usuários necessitam, sendo que nem sempre é possível.","C) não fornecem todas as informações de que esses usuários necessitam, no entanto, as normas contábeis estão sendo aprimoradas para que isso aconteça.","D) não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam considerar outras fontes.","E) não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam tirar as suas conclusões com base no que os relatórios divulgam."],"g":"D","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"A administração usa informações internas; não depende dos relatórios financeiros para fins gerais.","coment":"A alternativa correta é <b>D</b> — não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam considerar outras fontes.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":13,"meta":"FGV – TecGes Admin (ALEMA) – ALEMA – Contador – \"Sem Especialidade\" – 2023","q":"De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos e outros credores, existentes e potenciais, representam os principais usuários aos quais se destinam os relatórios financeiros para fins gerais. De acordo com a norma, a administração da entidade que reporta não é considerada usuário primário, uma vez que","alts":["A) pode obter internamente as informações financeiras de que precisa.","B) é a responsável direta pela elaboração destes relatórios financeiros.","C) tem necessidades de informação diferentes e possivelmente conflitantes em relação aos demais usuários.","D) sua necessidade é mais restrita e específica, enquanto os relatórios financeiros são mais abrangentes.","E) trabalha com representações exatas, enquanto os relatórios financeiros baseiam-se em estimativas, julgamentos e modelos."],"g":"A","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Relatório financeiro não entrega o valor exato da entidade; ele ajuda o usuário a estimar esse valor.","coment":"A alternativa correta é <b>A</b> — pode obter internamente as informações financeiras de que precisa.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":14,"meta":"FGV – Per (PC AM) – PC AM – 4ª Classe – Contabilidade – 2022","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro, as demonstrações contábeis fornecem informações sobre transações e outros eventos observados do ponto de vista","alts":["A) dos investidores.","B) dos credores existentes.","C) dos credores potenciais.","D) da entidade que reporta.","E) das autoridades governamentais."],"g":"D","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"A administração usa informações internas; não depende dos relatórios financeiros para fins gerais.","coment":"A alternativa correta é <b>D</b> — da entidade que reporta.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":15,"meta":"FGV – AFCTE (Sefaz AM) – SEFAZ AM – 2022","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, muitos investidores, credores por empréstimos e outros credores, existentes e potenciais, não podem exigir que as entidades forneçam informações diretamente a eles, sendo, portanto, os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Nesse sentido, em relação aos relatórios financeiros para fins gerais, de acordo com o Pronunciamento, assinale a afirmativa correta.","alts":["A) Destinam-se a apresentar o valor da entidade que reportam.","B) Baseiam -se em representações exatas e precisas do que se propõem a apresentar.","C) São completos, de modo que os usuários não precisam considerar informações de outras fontes.","D) Incluem informações adicionais que são úteis a um subconjunto específico de principais usuários.","E) Não são do interesse da administração da entidade que reporta, uma vez que esta obtém, internamente, as informações financeiras de que precisa."],"g":"D","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Decisões dos usuários: comprar, vender, manter, conceder crédito ou influenciar a administração.","coment":"A alternativa correta é <b>D</b> — Incluem informações adicionais que são úteis a um subconjunto específico de principais usuários.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":16,"meta":"FGV – Ana MP (MPE GO) – MPE GO – Analista Contábil – 2022","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos e outros credores existentes e potenciais são os principais usuários aos que se destinam os relatórios financeiros para fins gerais, uma vez que muitos deles","alts":["A) têm interesse pelos relatórios como um todo.","B) necessitam de informações precisas para basear a sua tomada de decisão.","C) podem ter outra localização geográfica, necessitando de parâmetros de informação diferenciada.","D) são os responsáveis por grande parte do financiamento das entidades que reportam.","E) não podem exigir que as entidades que reportam forneçam informações diretamente a eles."],"g":"E","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Objetivo central: informação financeira útil aos usuários primários para decisões sobre oferta de recursos.","coment":"A alternativa correta é <b>E</b> — não podem exigir que as entidades que reportam forneçam informações diretamente a eles.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":17,"meta":"FGV – Analista Judiciário TRT16 – TRT 16 – Administrativa – Contabilidade – 2022","q":"O objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta que sejam úteis a seus principais usuários, conforme definidos na norma, em sua tomada de decisões. Entre essas decisões está","alts":["A) oferecer bonificações aos colaboradores.","B) precificar os produtos e serviços oferecidos.","C) reconhecer e adotar as melhores práticas contábeis.","D) determinar o melhor mix de produtos a serem vendidos.","E) conceder ou liquidar empréstimos ou outras formas de crédito."],"g":"E","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"A administração usa informações internas; não depende dos relatórios financeiros para fins gerais.","coment":"A alternativa correta é <b>E</b> — conceder ou liquidar empréstimos ou outras formas de crédito.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":18,"meta":"FGV – Contador (MPE AL) – MPE AL – 2018","q":"De acordo com o Pronunciamento Conceitual Básico (R1) - Estrutura Conceitual para Elaboração e Divulgação de Relatório Contábil-Financeiro, assinale a opção que indica o objetivo do relatório contábil-financeiro de propósito geral.","alts":["A) Oferecer subsídio à alta administração e aos gestores da entidade, de modo que estes pautem as suas decisões relacionadas ao funcionamento regular da entidade.","B) Influenciar o relacionamento de investidores, credores, fornecedores e clientes com a entidade, garantindo a segurança necessária para suas transações.","C) Fazer a diferença nas decisões dos usuários, podendo ser utilizados como dados de entrada em processos empregados para predizer futuros resultados ou para confirmar as decisões tomadas.","D) Fornecer informações contábil-financeiras que sejam úteis para os investidores, para os credores por empréstimos e para os outros credores, quando da tomada de decisão ligada ao fornecimento de recursos para a entidade.","E) Garantir aos empregados e aos fornecedores da entidade que suas obrigações serão cumpridas."],"g":"D","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"A administração usa informações internas; não depende dos relatórios financeiros para fins gerais.","coment":"A alternativa correta é <b>D</b> — Fornecer informações contábil-financeiras que sejam úteis para os investidores, para os credores por empréstimos e para os outros credores, quando da tomada de decisão ligada ao fornecimento de recursos para a entidade.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":19,"meta":"FGV – Assistente Legislativo (ALERO) – ALERO – Técnico em Contabilidade – 2018","q":"O Pronunciamento Conceitual Básico (R1) - Estrutura Conceitual para Elaboração e Divulgação de Relatório Contábil-Financeiro determina quais são os usuários primários, para quem os relatórios contábil financeiros de propósito geral são direcionados. Entre os usuários primários estão","alts":["A) o governo e as agências reguladoras.","B) os investidores e os credores por empréstimo.","C) os diretores e os administradores.","D) os clientes e os fornecedores.","E) os empregados e os consumidores."],"g":"B","topic":"objetivo do relatório financeiro","chapter":"Capítulo 1 — Objetivo do Relatório Financeiro para Fins Gerais","memo":"Objetivo central: informação financeira útil aos usuários primários para decisões sobre oferta de recursos.","coment":"A alternativa correta é <b>B</b> — os investidores e os credores por empréstimo.. O CPC 00 estabelece que o relatório financeiro para fins gerais deve fornecer informação útil aos usuários primários para decisões sobre a oferta de recursos à entidade."},{"num":20,"meta":"FGV – Perito Oficial Criminal (PC PI) – PC PI – Perito Criminal – Contabilidade ou Economia – 2026","q":"Uma empresa alimentícia realiza as suas entregas interestaduais por meio de um caminhão de carga. Em 10/12/2024, a empresa foi notificada porque o caminhão transportava mais do que o limite local permitido. O prazo para pagamento da multa era de 30 dias e não havia possibilidade de recorrer. Ao realizar a sua Demonstração do Resultado anual, referente a 2024, a empresa decidiu esperar até a finalização do prazo para pagamento da multa para reconhecer a despesa. Ao analisar o fato, um perito constatou que não foi atendida a característica qualitativa da","alts":["A) neutralidade.","B) tempestividade.","C) continuidade.","D) materialidade.","E) compreensibilidade."],"g":"B","topic":"tempestividade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Tempestividade é disponibilizar a informação a tempo de influenciar decisões.","coment":"A alternativa correta é <b>B</b> — tempestividade.. A ideia central é que a informação precisa estar disponível a tempo de influenciar a decisão do usuário. Se chega tarde, perde utilidade."},{"num":21,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2026","q":"Em 2024, uma empresa de varejo estimava inadimplência de 2% sobre o saldo de Clientes. Em 2025, buscando aumentar as vendas, a empresa reduziu as suas exigências para concessão de crédito aos clientes. Assim, uma análise criteriosa indicava que a inadimplência seria muito próxima de 5% nesse ano. No entanto, uma vez que os administradores da empresa são avaliados de acordo com o resultado operacional, eles escolheram continuar utilizando a estimativa anterior, de 2%. Ao avaliar se a informação contábil pode ser considerada representação fidedigna, é correto concluir que","alts":["A) pode ser, uma vez que é comparável.","B) pode ser, uma vez que é tempestiva.","C) não pode ser, uma vez que não é neutra.","D) não pode ser, uma vez que não é verificável."],"g":"C","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"CNI: representação fidedigna precisa ser Completa, Neutra e Isenta de erros.","coment":"A alternativa correta é <b>C</b> — não pode ser, uma vez que não é neutra.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":22,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2025","q":"Um supermercado funciona na região sul do país. Em maio de 2024, devido às fortes chuvas, o supermercado perdeu todo o seu estoque. Nas demonstrações contábeis mensais, em 31/05/24, o supermercado optou por baixar todo o estoque, mesmo sem ter recebido um laudo oficial, de modo a tornar as demonstrações mais úteis aos tomadores de decisões. A informação apresenta a seguinte característica qualitativa:","alts":["A) neutralidade.","B) materialidade.","C) verificabilidade.","D) tempestividade."],"g":"D","topic":"materialidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"A informação é material quando sua omissão, distorção ou obscuridade pode influenciar decisões.","coment":"A alternativa correta é <b>D</b> — tempestividade.. A materialidade depende da natureza ou magnitude da informação no contexto da entidade e está ligada à capacidade de influenciar decisões."},{"num":23,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2025","q":"Segundo a NBC TG ESTRUTURA CONCEITUAL, para a representação dos relatórios financeiros ser fidedigna ela precisa ser","alts":["A) completa, neutra e isenta de erros.","B) confiável, tempestiva e com erros mínimos.","C) tempestiva, útil e comparável.","D) consistente, completa e compreensível."],"g":"A","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"CNI: representação fidedigna precisa ser Completa, Neutra e Isenta de erros.","coment":"A alternativa correta é <b>A</b> — completa, neutra e isenta de erros.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":24,"meta":"FGV – Analista da Defensoria Pública (DPE RO) – DPE RO – Contábil – 2025","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro. Em relação a essa restrição, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) O relatório de informações financeiras impõe custos, e é importante que esses custos sejam justificados pelos benefícios de apresentar essas informações. ( ) Os fornecedores de informações financeiras gastam a maior parte dos esforços envolvidos na coleta, processamento, verificação e disseminação de informações financeiras, mas, em última instância, os usuários arcam com esses custos na forma de retornos reduzidos. ( ) Os usuários de informações financeiras podem incorrer em custos de análise e interpretação das informações fornecidas. Se as informações necessárias não são fornecidas, os usuários incorrem em custos de realizar a análise incompleta, sem as devidas informações. As afirmativas são, respectivamente,","alts":["A) V – V – V.","B) V – V – F.","C) V – F – V.","D) F – V – V.","E) V – F – F."],"g":"B","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Os benefícios da informação devem justificar os custos de prepará-la, divulgar, auditar e analisar.","coment":"A alternativa correta é <b>B</b> — V – V – F.. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":25,"meta":"FGV – Técnico da Defensoria Pública (DPE RO) – DPE RO – Técnico em Contabilidade – 2025","q":"Um médico é proprietário de uma clínica integrativa. Para avaliar como estão os seus negócios, ele estudou e adquiriu conhecimento relacionado às atividades comerciais, contábeis e econômicas e começou a revisar e analisar as informações de modo diligente. De acordo com a característica qualitativa da Compreensibilidade, conforme o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, os relatórios financeiros da clínica","alts":["A) são elaborados para o médico, uma vez que ele deve pagar impostos sobre o resultado obtido.","B) não são elaborados para o médico, uma vez que, como dono, ele pode conseguir as informações que deseja diretamente.","C) são elaborados para o médico, uma vez que ele é o proprietário da clínica e, como consequência, interessado em seus resultados.","D) são elaborados para o médico, uma vez que ele tem conhecimento das atividades comerciais e econômicas e revisa e analisa as informações de modo diligente.","E) não são elaborados para o médico, uma vez que há pessoas na clínica responsáveis pela administração contábil e financeira dos negócios."],"g":"D","topic":"compreensibilidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"O CPC 00 presume usuário com conhecimento razoável e análise diligente.","coment":"A alternativa correta é <b>D</b> — são elaborados para o médico, uma vez que ele tem conhecimento das atividades comerciais e econômicas e revisa e analisa as informações de modo diligente.. A compreensibilidade exige apresentação clara e concisa, considerando usuários com conhecimento razoável e análise diligente."},{"num":26,"meta":"FGV – Técnico da Defensoria Pública (DPE RO) – DPE RO – Técnico em Contabilidade – 2025","q":"Leia o fragmento a seguir. “Tempestividade significa disponibilizar informações aos __________ a tempo para que sejam capazes de __________ as suas decisões”. Assinale a alternativa cujos itens completam corretamente as lacunas do fragmento acima, de acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro:","alts":["A) tomadores de decisões – modificar.","B) tomadores de decisões – influenciar.","C) administradores da entidade – modificar.","D) administradores da entidade – influenciar.","E) administradores da entidade – corroborar."],"g":"B","topic":"tempestividade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Se o fato já afeta a decisão do usuário, a demora pode comprometer a utilidade da informação.","coment":"A alternativa correta é <b>B</b> — tomadores de decisões – influenciar.. A ideia central é que a informação precisa estar disponível a tempo de influenciar a decisão do usuário. Se chega tarde, perde utilidade."},{"num":27,"meta":"FGV – Analista de Gestão Municipal (Pref SJC) – Pref SJC – Ciências Contábeis – 2025","q":"Ao analisar as informações contábeis produzidas e divulgadas por uma entidade do setor público, o funcionário responsável por apresentar um posicionamento técnico sobre o desempenho da entidade constatou que a informação não era tempestiva. Desse modo, a informação poderia ter menos","alts":["A) utilidade.","B) materialidade.","C) verificabilidade.","D) comparabilidade.","E) compreensibilidade."],"g":"A","topic":"materialidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"A informação é material quando sua omissão, distorção ou obscuridade pode influenciar decisões.","coment":"A alternativa correta é <b>A</b> — utilidade.. A materialidade depende da natureza ou magnitude da informação no contexto da entidade e está ligada à capacidade de influenciar decisões."},{"num":28,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2025","q":"De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, as características qualitativas fundamentais são relevância e representação fidedigna, sendo que, para ser representação fidedigna, a representação deve ser completa, neutra e isenta de erros. Uma informação neutra pode","alts":["A) ser parcial.","B) ser prudente.","C) possuir inclinações.","D) ser tendenciosa na seleção de informações financeiras."],"g":"B","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Prudência é cautela sob incerteza, sem superavaliar nem subavaliar elementos.","coment":"A alternativa correta é <b>B</b> — ser prudente.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":29,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2025","q":"De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, para ajudar os usuários das demonstrações contábeis a identificar e avaliar mudanças e tendências, as demonstrações contábeis","alts":["A) são elaboradas com base na forma jurídica, em detrimento da essência das transações.","B) restringem a utilização de estimativas a casos em que poderá haver perdas financeiras do usuário.","C) incluem, apenas, informações que podem ser compreendidas, também, por usuários com pouco conhecimento das atividades comerciais e econômicas, sem auxílio de consultores.","D) fornecem informações comparativas de, pelo menos, um período de relatório anterior."],"g":"D","topic":"comparabilidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Informações comparativas de período anterior fortalecem a análise do usuário.","coment":"A alternativa correta é <b>D</b> — fornecem informações comparativas de, pelo menos, um período de relatório anterior.. A comparabilidade permite que o usuário identifique semelhanças, diferenças, mudanças e tendências entre períodos ou entidades."},{"num":30,"meta":"FGV – Ana Gest (AgSUS) – AgSUS – Contabilidade – 2025","q":"A direção de uma sociedade empresária decidiu divulgar, ao público, as vendas realizadas em tempo real, de modo a tentar uma conexão com os seus usuários, o que gerou gastos adicionais com pessoal e sistemas. Após um ano, foi realizada uma pesquisa e verificou-se que os usuários não deram valor a essa informação, após a implantação da divulgação. Além disso, não foi possível verificar outro tipo de retorno relacionado à ação. Considerando o conteúdo do Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, pode-se concluir que","alts":["A) a divulgação foi incompleta.","B) a ação perdeu a tempestividade.","C) a continuidade operacional não foi seguida.","D) os custos foram maiores do que os benefícios.","E) os resultados não seguiram à verificabilidade."],"g":"D","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Mesmo que o preparador suporte o custo inicial, os usuários podem arcar indiretamente com retornos reduzidos.","coment":"A alternativa correta é <b>D</b> — os custos foram maiores do que os benefícios.. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":31,"meta":"FGV – Contador (Nittrans) – Nittrans – 2025","q":"Uma sociedade empresária pretende encerrar as suas atividades e entrar em liquidação no início do exercício seguinte. Desse modo, elaborou as suas demonstrações contábeis com base na suposição de continuidade operacional. Considerando a situação da empresa e o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o posicionamento da sociedade empresária, ao elaborar as suas demonstrações, está","alts":["A) correto, uma vez que está sendo respeitado o princípio da entidade contábil.","B) correto, desde que os custos sejam menores do que os benefícios.","C) incorreto, uma vez que se deve adotar a essência sobre a forma.","D) correto, uma vez que as demonstrações contábeis devem ser elaboradas de acordo com o Regime de Caixa.","E) incorreto, uma vez que as demonstrações contábeis podem ter que ser elaboradas em base diferente."],"g":"E","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Informação sem benefício para o usuário pode não justificar o custo de divulgação.","coment":"A alternativa correta é <b>E</b> — incorreto, uma vez que as demonstrações contábeis podem ter que ser elaboradas em base diferente.. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":32,"meta":"FGV – Técnico (Nittrans) – Nittrans – Contábil – 2025","q":"De acordo com a característica qualitativa da verificabilidade, a verificação pode ocorrer de forma direta ou indireta. Assinale a opção que apresenta um exemplo de verificação indireta","alts":["A) Contagem de caixa.","B) Realização de inventário dos ativos imobilizados em uso.","C) Observação de títulos negociáveis e suas cotações de preço.","D) Confirmação de que os fatores identificados que influenciaram o desempenho passado estão presentes e relacionados com os efeitos identificados.","E) Verificação do valor contábil do estoque por meio da conferência das entradas e do recálculo do estoque final utilizando o mesmo método de mensuração."],"g":"E","topic":"verificabilidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Verificação direta ocorre por observação direta, como contagem de caixa.","coment":"A alternativa correta é <b>E</b> — Verificação do valor contábil do estoque por meio da conferência das entradas e do recálculo do estoque final utilizando o mesmo método de mensuração.. A verificabilidade ajuda os usuários a terem segurança de que a informação representa fielmente o fenômeno econômico."},{"num":33,"meta":"FGV – Ana Geo (CPRM) – CPRM – Contabilidade – 2025","q":"Em relação à aplicação das características qualitativas de informações financeiras úteis, é correto afirmar que, em determinas circunstâncias, pode ser útil uma informação que é","alts":["A) tempestiva, mas não neutra.","B) verificável, mas não completa.","C) relevante, mas não comparável.","D) material, mas não representação fidedigna.","E) compreensível, mas não isenta de erros materiais."],"g":"C","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Prudência é cautela sob incerteza, sem superavaliar nem subavaliar elementos.","coment":"A alternativa correta é <b>C</b> — relevante, mas não comparável.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":34,"meta":"FGV – Técnico NS (TJ MS) – TJ MS – Analista Técnico-Contábil – 2024","q":"O entendimento efetivo de conceitos a partir das normas e dos pronunciamentos contábeis é imprescindível para que as informações sejam relevantes e representem fidedignamente o reconhecimento e a mensuração de ativos, passivos, patrimônio líquido, receitas e despesas da entidade. Em se tratando dos preceitos das normas e dos pronunciamentos contábeis, é correto afirmar que:","alts":["A) a neutralidade é inconsistente com o exercício da prudência;","B) representação fidedigna significa representação precisa em todos os aspectos;","C) determinados pronunciamentos podem conter requisitos assimétricos, como, por exemplo, provisões e ativos contingentes;","D) prudência significa que ativos e receitas devem ser superavaliados e passivos e despesas devem ser subavaliados;","E) informações neutras significam informações sem nenhum propósito ou sem nenhuma influência sobre o comportamento."],"g":"C","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Neutralidade não é ausência de impacto; informação relevante naturalmente influencia decisões.","coment":"A alternativa correta é <b>C</b> — determinados pronunciamentos podem conter requisitos assimétricos, como, por exemplo, provisões e ativos contingentes;. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":35,"meta":"FGV – Contador (Pref Caraguatatuba) – Pref Caraguatatuba – 2024","q":"O custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro. De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o relatório de informações financeiras impõe custos, e é importante que esses custos sejam justificados pelo(s)","alts":["A) resultados financeiros deste período.","B) resultados operacionais deste período.","C) número de horas trabalhadas para elabora-lo.","D) número de profissionais envolvidos no processo.","E) benefícios de apresentar essas informações."],"g":"E","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Mesmo que o preparador suporte o custo inicial, os usuários podem arcar indiretamente com retornos reduzidos.","coment":"A alternativa correta é <b>E</b> — benefícios de apresentar essas informações.. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":36,"meta":"FGV – Contador (Pref Caraguatatuba) – Pref Caraguatatuba – 2024","q":"De acordo com a NBC TG 23 (R2) – Políticas Contábeis, Mudança de Estimativa e Retificação de Erro, a menos que for exigida ou resultar em informação mais relevante, as mesmas políticas contábeis devem ser aplicadas em cada período e de um período para o outro. Isso acontece para possibilitar a seguinte característica qualitativa da informação financeira útil em relação às demonstrações contábeis.","alts":["A) Relevância.","B) Oportunidade.","C) Tempestividade.","D) Comparabilidade.","E) Compreensibilidade."],"g":"D","topic":"relevância","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"A mesma informação pode ter valor preditivo e confirmatório ao mesmo tempo.","coment":"A alternativa correta é <b>D</b> — Comparabilidade.. A informação relevante é aquela capaz de fazer diferença nas decisões, por possuir valor preditivo, confirmatório ou ambos."},{"num":37,"meta":"FGV – CInt (Pref Caraguatatuba) – Pref Caraguatatuba – 2024","q":"Em relação à estrutura conceitual para Relatório Financeiro da contabilidade e às suas implicações, pode-se afirmar que, nas demonstrações contábeis, as informações financeiras úteis devem","alts":["A) ser corrigidas pela inflação.","B) utilizar sempre os mesmos padrões.","C) ser produzidas e apresentadas sem custos.","D) ser disponibilizadas aos usuários no momento em que os eventos econômicos ocorrem.","E) representar de forma fidedigna a essência dos fenômenos que pretendem representar."],"g":"E","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Custo é a restrição generalizada da informação financeira útil.","coment":"A alternativa correta é <b>E</b> — representar de forma fidedigna a essência dos fenômenos que pretendem representar.. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":38,"meta":"FGV – Aud CE (TCE-PA) – TCE PA – Fiscalização – Contabilidade – 2024","q":"Uma entidade do setor público elabora anualmente informações sobre a sua situação patrimonial e o seu desempenho. Em 2023, ela elaborou as informações de maneira diferenciada, de modo que não foi possível aos usuários identificar semelhanças e diferenças entre as informações de 2023 e de 2022 e nem tomar decisões com base nelas. Assinale a opção que indica a característica qualitativa que não foi diretamente atendida no período:","alts":["A) Materialidade.","B) Tempestividade.","C) Verificabilidade.","D) Comparabilidade.","E) Compreensibilidade."],"g":"D","topic":"materialidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"A informação é material quando sua omissão, distorção ou obscuridade pode influenciar decisões.","coment":"A alternativa correta é <b>D</b> — Comparabilidade.. A materialidade depende da natureza ou magnitude da informação no contexto da entidade e está ligada à capacidade de influenciar decisões."},{"num":39,"meta":"FGV – Aud CE (TCE-PA) – TCE PA – Administrativa – Contabilidade – 2024","q":"De acordo com a característica qualitativa da relevância, as informações financeiras e não financeiras são relevantes caso sejam capazes de influenciar significativamente o cumprimento dos objetivos da elaboração e da divulgação da informação contábil. Para que a informação exerça essa influência, deve","alts":["A) ser inédita aos usuários.","B) ser apresentada de maneira clara e sucinta.","C) ter valor confirmatório, preditivo ou ambos.","D) estar disponível no momento em que acontece.","E) ser considerada pelos usuários na tomada de decisão."],"g":"C","topic":"relevância","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Valor confirmatório: confirma ou altera avaliações anteriores.","coment":"A alternativa correta é <b>C</b> — ter valor confirmatório, preditivo ou ambos.. A informação relevante é aquela capaz de fazer diferença nas decisões, por possuir valor preditivo, confirmatório ou ambos."},{"num":40,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"Em 2023, uma entidade desreconheceu um ativo de seu balanço patrimonial. Assinale a opção que indica uma possível causa para o desreconhecimento.","alts":["A) A entidade decidiu utilizar um terreno para finalidade diferente.","B) A entidade perdeu o controle de um imóvel, por meio de decisão judicial.","C) A entidade renegociou o prazo de recebimento de seus clientes, que estavam em situação financeira difícil.","D) A entidade constatou que as suas máquinas poderiam ser utilizadas por tempo maior do que a vida útil prevista."],"g":"B","topic":"tempestividade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Tempestividade é disponibilizar a informação a tempo de influenciar decisões.","coment":"A alternativa correta é <b>B</b> — A entidade perdeu o controle de um imóvel, por meio de decisão judicial.. A ideia central é que a informação precisa estar disponível a tempo de influenciar a decisão do usuário. Se chega tarde, perde utilidade."},{"num":41,"meta":"FGV – AGC (EPE) – EPE – Contabilidade – 2024","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2), a Estrutura Conceitual para Relatório Financeiro contribui para a missão de desenvolver pronunciamentos que tragam aos mercados financeiros","alts":["A) arrojamento, eficiência e comparabilidade.","B) transparência, comparabilidade e exatidão.","C) exatidão, redução de custos e conhecimento.","D) prestação de contas, economia e arrojamento.","E) transparência, prestação de contas e eficiência."],"g":"E","topic":"comparabilidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Informações comparativas de período anterior fortalecem a análise do usuário.","coment":"A alternativa correta é <b>E</b> — transparência, prestação de contas e eficiência.. A comparabilidade permite que o usuário identifique semelhanças, diferenças, mudanças e tendências entre períodos ou entidades."},{"num":42,"meta":"FGV – Analista Judiciário (TJ RR) – TJ RR – Contabilidade – 2024","q":"Em 2023, uma entidade realizou transações com instrumentos financeiros derivativos, que foram consideradas complexas. A entidade optou por não incluir essas transações em suas demonstrações contábeis, de modo a tornar mais fácil a compreensão das informações contidas em suas demonstrações. Em relação à aplicação direta das características qualitativas das informações financeiras úteis, é correto afirmar que as demonstrações contábeis","alts":["A) estão de acordo com a relevância.","B) estão de acordo com a prudência.","C) não estão de acordo com a tempestividade.","D) não estão de acordo com a representação fidedigna.","E) estão de acordo com a capacidade de verificação."],"g":"D","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"CNI: representação fidedigna precisa ser Completa, Neutra e Isenta de erros.","coment":"A alternativa correta é <b>D</b> — não estão de acordo com a representação fidedigna.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":43,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2024","q":"Considerado um fato relevante divulgado por uma empresa de capital aberto, a perspectiva de alto potencial de entrada de benefícios econômicos futuros na aquisição de um novo ativo operacional resultou em um aumento (de R$ 4,50 para R$ 60,50 no valor nominal) de suas ações negociadas em Bolsa de Valores no país e no exterior. Dois meses depois, verificou-se que tal fato relevante era falso e que o acionista majoritário tinha conhecimento disso, o que resultou em prejuízo de bilhões de reais para entidade e foi tratado como crime contra o mercado financeiro. Na divulgação inicial do fato relevante, a característica qualitativa fundamental que deixou de ser observada pela entidade foi a","alts":["A) comparabilidade.","B) prudência.","C) verificabilidade.","D) representação fidedigna."],"g":"D","topic":"relevância","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"A mesma informação pode ter valor preditivo e confirmatório ao mesmo tempo.","coment":"A alternativa correta é <b>D</b> — representação fidedigna.. A informação relevante é aquela capaz de fazer diferença nas decisões, por possuir valor preditivo, confirmatório ou ambos."},{"num":44,"meta":"FGV – Bach (CFC) – CFC – 2º Exame de Suficiência – 2024","q":"Um investidor está analisando as demonstrações contábeis de uma sociedade empresária. O investidor tem disponível, para a sua análise, as demonstrações referentes a 31/12/2023, mas não as dos exercícios anteriores. Nesse caso, o investidor não poderá verificar a seguinte característica qualitativa:","alts":["A) relevância.","B) tempestividade.","C) comparabilidade.","D) compreensibilidade."],"g":"C","topic":"tempestividade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Tempestividade é disponibilizar a informação a tempo de influenciar decisões.","coment":"A alternativa correta é <b>C</b> — comparabilidade.. A ideia central é que a informação precisa estar disponível a tempo de influenciar a decisão do usuário. Se chega tarde, perde utilidade."},{"num":45,"meta":"FGV – Contador (CGM RJ) – Pref RJ – 2023","q":"Uma empresa atualizou seu sistema contábil. Após a finalização de implementação do novo sistema, o plano de contas não mais segregava as contas a receber de controladas e coligadas. Nesse caso, a mudança ocorrida afeta a:","alts":["A) tempestividade, devido ao atraso na divulgação da informação contábil, prejudicando a sua confiabilidade;","B) materialidade, devido à informação ser incompleta e fora dos limites de materialidade e custo;","C) consistência, pois a apresentação e a classificação de itens nas demonstrações contábeis devem ser mantidas de um período para outro;","D) compensação de valores, pois a entidade deve compensar ativos e passivos ou receitas e despesas para divulgação ao usuário interno;","E) uniformidade, pois permite aos usuários identificar e compreender similaridades e diferenças."],"g":"C","topic":"materialidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Materialidade é aspecto da relevância específico da entidade.","coment":"A alternativa correta é <b>C</b> — consistência, pois a apresentação e a classificação de itens nas demonstrações contábeis devem ser mantidas de um período para outro;. A materialidade depende da natureza ou magnitude da informação no contexto da entidade e está ligada à capacidade de influenciar decisões."},{"num":46,"meta":"FGV – Per (PC AM) – PC AM – 4ª Classe – Contabilidade – 2022","q":"Entre as características qualitativas de informações financeiras úteis está a representação fidedigna, que deve ser completa, neutra e isenta de erros. Assinale a opção correta em relação a esses atributos, de acordo com o Pronunciamento Técnico CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro.","alts":["A) O exercício da neutralidade não permite a superavaliação de ativos ou receitas ou a subavaliação de passivos ou despesas.","B) O exercício da representação isenta de erros implica em classificar, caracterizar e apresentar informações de modo claro e conciso.","C) A representação neutra implica em informações que não exercem influência sobre o comportamento e as decisões dos usuários.","D) A representação isenta de erros deve ser precisa, de modo que os valores monetários que não podem ser observados diretamente devem ser estimados apenas quando há certeza na mensuração.","E) A representação completa inclui todas as informações necessárias para que o usuário compreenda os fenômenos que estão sendo representados, inclusive todas as descrições e explicações necessárias."],"g":"E","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Livre de erros não significa precisão perfeita; significa processo correto e sem omissões relevantes.","coment":"A alternativa correta é <b>E</b> — A representação completa inclui todas as informações necessárias para que o usuário compreenda os fenômenos que estão sendo representados, inclusive todas as descrições e explicações necessárias.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":47,"meta":"FGV – Analista Judiciário (TJDFT) – TJDFT – Apoio Especializado – Contabilidade – 2022","q":"As características qualitativas da informação financeira útil identificam os tipos de informações que tendem a ser mais úteis a investidores e credores para que tomem decisões sobre a entidade. A tratar de tais características, o texto da Estrutura Conceitual afirma que:","alts":["A) a representação neutra da informação contábil reduz a capacidade de julgamento dos usuários;","B) a utilidade das informações financeiras é aumentada se elas forem materiais;","C) o custo é uma restrição generalizada sobre a capacidade da entidade de fornecer informações financeiras úteis;","D) o valor confirmatório é um atributo das informações financeiras quando elas são compreensíveis;","E) o valor preditivo é um atributo das informações financeiras quando elas são tempestivas."],"g":"C","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Informação sem benefício para o usuário pode não justificar o custo de divulgação.","coment":"A alternativa correta é <b>C</b> — o custo é uma restrição generalizada sobre a capacidade da entidade de fornecer informações financeiras úteis;. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":48,"meta":"FGV – AT (TCE TO) – TCE TO – Ciências Contábeis – 2022","q":"O princípio da prudência é fundamental na contabilidade porque aumenta a confiança de diversos stakeholders. Assim, segundo o CPC 00 (R2), a prudência pode ser conceituada como o(a):","alts":["A) atribuição de menor valor para as receitas e maior valor para as despesas;","B) superavaliação de ativos e a subavaliação de passivos;","C) exercício de cautela ao fazer julgamentos sob condições de incerteza;","D) componente do patrimônio que tenha seu registro inicial efetuado pelo valor ocorrido na data da transação com o mundo exterior à entidade;","E) separação do patrimônio da entidade e de seus respectivos sócios."],"g":"C","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"CNI: representação fidedigna precisa ser Completa, Neutra e Isenta de erros.","coment":"A alternativa correta é <b>C</b> — exercício de cautela ao fazer julgamentos sob condições de incerteza;. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":49,"meta":"FGV – Per Cri (PCA AP) – PCA AP – Ciências Contábeis – 2022","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro. No entanto, devido à subjetividade inerente, as avaliações de diferentes indivíduos sobre os custos e benefícios da apresentação de itens específicos de informações financeiras variam. Nesse caso, procura-se","alts":["A) enfatizar os esforços envolvidos na análise e interpretação das informações fornecidas.","B) considerar custos e benefícios em relação ao relatório financeiro, de modo geral.","C) considerar todos os custos e benefícios individualmente, de acordo com as entidades que reportam.","D) considerar custos e benefícios conforme os interesses dos usuários primários do relatório financeiro.","E) enfatizar os esforços envolvidos na coleta, processamento, verificação e disseminação de informações financeiras."],"g":"B","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Mesmo que o preparador suporte o custo inicial, os usuários podem arcar indiretamente com retornos reduzidos.","coment":"A alternativa correta é <b>B</b> — considerar custos e benefícios em relação ao relatório financeiro, de modo geral.. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":50,"meta":"FGV – Ana Esp (IMBEL) – IMBEL – Analista Contábil – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, a compreensibilidade é uma das características qualitativas de melhoria de informações financeiras úteis. Em relação às implicações da característica qualitativa da compreensibilidade, assinale a afirmativa correta.","alts":["A) Os usuários devem poder identificar e compreender similaridades e diferenças entre itens.","B) Os fenômenos complexos e de difícil compreensão devem ser excluídos dos relatórios financeiros.","C) As informações devem ser disponibilizadas aos tomadores de decisões a tempo para que sejam capazes de influenciar suas decisões.","D) As informações devem ser evidenciadas de modo que os usuários não precisem buscar o auxílio de consultores para compreender os relatórios financeiros.","E) Os relatórios financeiros devem ser elaborados para usuários que têm conhecimento razoável das atividades comerciais e econômicas e que revisam e analisam as informações de modo diligente."],"g":"E","topic":"compreensibilidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Compreensibilidade exige classificar, caracterizar e apresentar a informação de modo claro e conciso.","coment":"A alternativa correta é <b>E</b> — Os relatórios financeiros devem ser elaborados para usuários que têm conhecimento razoável das atividades comerciais e econômicas e que revisam e analisam as informações de modo diligente.. A compreensibilidade exige apresentação clara e concisa, considerando usuários com conhecimento razoável e análise diligente."},{"num":51,"meta":"FGV – Ana Esp (IMBEL) – IMBEL – Analista Contábil – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, assinale a opção que apresenta uma restrição generalizada sobre as informações que podem ser fornecidas em relatório financeiro.","alts":["A) O tempo.","B) O custo.","C) A subjetividade.","D) Os recursos limitados.","E) A quantidade de normas."],"g":"B","topic":"restrição de custo","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Os benefícios da informação devem justificar os custos de prepará-la, divulgar, auditar e analisar.","coment":"A alternativa correta é <b>B</b> — O custo.. O custo é uma restrição generalizada: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la."},{"num":52,"meta":"FGV – Sup (IMBEL) – IMBEL – Contador – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, as informações financeiras relevantes são capazes de fazer diferença nas decisões tomadas pelos usuários e podem ter valor preditivo. Em relação às informações financeiras relevantes com valor preditivo, assinale a afirmativa correta.","alts":["A) Confirmam ou alteram avaliações anteriores.","B) Devem servir como prognóstico aos usuários.","C) São empregadas pelos usuários para fazer suas próprias previsões.","D) São utilizadas em processos empregados pelos usuários para analisar resultados passados","E) Representam uma novidade aos usuários, sendo que eles não teriam conhecimento delas a partir de outras fontes."],"g":"C","topic":"relevância","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Valor confirmatório: confirma ou altera avaliações anteriores.","coment":"A alternativa correta é <b>C</b> — São empregadas pelos usuários para fazer suas próprias previsões.. A informação relevante é aquela capaz de fazer diferença nas decisões, por possuir valor preditivo, confirmatório ou ambos."},{"num":53,"meta":"FGV – AFRE ES – SEFAZ ES – 2021","q":"Relacione as características qualitativas de melhoria de informações financeiras úteis às suas respectivas explicações. 1. Comparabilidade 2. Capacidade de verificação 3. Tempestividade 4. Compreensibilidade ( ) permite aos usuários identificar e compreender similaridades e diferenças entre itens. ( ) implica em classificar, caracterizar e apresentar informações de modo claro e conciso. ( ) significa disponibilizar informações aos tomadores de decisões a tempo para que sejam capazes de influenciar suas decisões. ( ) ajuda a garantir aos usuários que as informações representem de forma fidedigna os fenômenos econômicos que pretendem representar Assinale a opção que apresenta, segundo a ordem apresentada, a relação correta.","alts":["A) 4 – 2 – 3 – 1.","B) 4 – 3 – 2 – 1.","C) 1 – 2 – 3 – 4.","D) 1 – 4 – 3 – 2.","E) 2 – 4 – 1 – 3."],"g":"D","topic":"tempestividade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Tempestividade é disponibilizar a informação a tempo de influenciar decisões.","coment":"A alternativa correta é <b>D</b> — 1 – 4 – 3 – 2.. A ideia central é que a informação precisa estar disponível a tempo de influenciar a decisão do usuário. Se chega tarde, perde utilidade."},{"num":54,"meta":"FGV – Analista Judiciário (TJ RO) – TJ RO – Contador – 2021","q":"Uma equipe de analistas financeiros estava realizando um processo de análise para conceder fiança a uma entidade requerente. A equipe usou como fontes de informações as demonstrações contábeis individuais e consolidadas dos últimos cinco anos. Na opinião da equipe de analistas, a demonstração dos fluxos de caixa e o balanço patrimonial da entidade foram o que mais influenciou a decisão tomada pela equipe. No caso narrado, a característica qualitativa da informação contábil em destaque no trabalho da equipe de analistas foi:","alts":["A) comparabilidade;","B) compreensibilidade;","C) relevância;","D) representação fidedigna;","E) tempestividade."],"g":"C","topic":"tempestividade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Informação atrasada perde utilidade, mesmo que possa ser confirmada depois.","coment":"A alternativa correta é <b>C</b> — relevância;. A ideia central é que a informação precisa estar disponível a tempo de influenciar a decisão do usuário. Se chega tarde, perde utilidade."},{"num":55,"meta":"FGV – Ana Esp (IMBEL) – IMBEL – Analista Contábil – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, a representação fidedigna é uma das características qualitativas fundamentais de informações financeiras úteis. Para ser fidedigna, a representação deve ser","alts":["A) relevante, completa e tempestiva.","B) neutra, verificável e comparável.","C) relevante, verificável e isenta de erros.","D) completa, neutra e isenta de erros.","E) comparável, tempestiva e relevante."],"g":"D","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Prudência é cautela sob incerteza, sem superavaliar nem subavaliar elementos.","coment":"A alternativa correta é <b>D</b> — completa, neutra e isenta de erros.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":56,"meta":"FGV – Ana Esp (IMBEL) – IMBEL – Analista Contábil – 2021","q":"De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, para ajudar os usuários a identificar e avaliar mudanças e tendências, as demonstrações contábeis devem","alts":["A) detalhar os principais fatos contabilizados nas notas explicativas.","B) incluir o relatório do auditor em sua publicação.","C) fornecer informações comparativas de, pelo menos, um período de relatório anterior.","D) apresentar a Demonstração do Valor Adicionado.","E) apresentar a remuneração dos membros do Conselho de Administração."],"g":"C","topic":"comparabilidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Informações comparativas de período anterior fortalecem a análise do usuário.","coment":"A alternativa correta é <b>C</b> — fornecer informações comparativas de, pelo menos, um período de relatório anterior.. A comparabilidade permite que o usuário identifique semelhanças, diferenças, mudanças e tendências entre períodos ou entidades."},{"num":57,"meta":"FGV – Contador (MPE AL) – MPE AL – 2018","q":"O Pronunciamento Conceitual Básico (R1) - Estrutura Conceitual para Elaboração e Divulgação de Relatório Contábil-Financeiro apresenta as características qualitativas da informação contábil-financeira útil. Assinale a opção que indica a característica qualitativa que permite que os usuários identifiquem e compreendam as similaridades dos itens e as diferenças entre eles.","alts":["A) Representação fidedigna.","B) Comparabilidade.","C) Verificabilidade.","D) Tempestividade.","E) Compreensibilidade."],"g":"B","topic":"verificabilidade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Nem sempre os verificadores chegam a valor único, mas podem chegar a consenso razoável.","coment":"A alternativa correta é <b>B</b> — Comparabilidade.. A verificabilidade ajuda os usuários a terem segurança de que a informação representa fielmente o fenômeno econômico."},{"num":58,"meta":"FGV – Analista Legislativo (ALERO) – ALERO – Contabilidade – 2018","q":"De acordo com o Pronunciamento Conceitual Básico (R1)- Estrutura Conceitual para elaboração e divulgação de relatório contábil- financeiro, as características qualitativas da informação contábil- financeira podem ser divididas em fundamentais e de melhoria. Assinale a opção que indica as características qualitativas fundamentais.","alts":["A) Confiabilidade e materialidade.","B) Relevância e representação fidedigna.","C) Essência sobre a forma e neutralidade.","D) Comparabilidade e tempestividade.","E) Compreensibilidade e verificabilidade."],"g":"B","topic":"representação fidedigna","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"Neutralidade não é ausência de impacto; informação relevante naturalmente influencia decisões.","coment":"A alternativa correta é <b>B</b> — Relevância e representação fidedigna.. A representação fidedigna exige que a informação represente adequadamente o fenômeno econômico, com completude, neutralidade e ausência de erros relevantes."},{"num":59,"meta":"FGV – Analista Legislativo (ALERO) – ALERO – Contabilidade – 2018","q":"As demonstrações contábeis normalmente são elaboradas tendo como premissa que a entidade está em atividade e irá manter-se em operação por um futuro previsível. De acordo com o Pronunciamento Conceitual Básico (R1) - Estrutura Conceitual para elaboração e divulgação de relatório contábil financeiro, essa premissa é chamada de","alts":["A) continuidade.","B) entidade.","C) essência sobre a forma.","D) comparabilidade.","E) tempestividade."],"g":"A","topic":"tempestividade","chapter":"Capítulo 2 — Características Qualitativas da Informação Útil","memo":"No CPC 00, ser tempestivo não significa esperar certeza absoluta para só então informar.","coment":"A alternativa correta é <b>A</b> — continuidade.. A ideia central é que a informação precisa estar disponível a tempo de influenciar a decisão do usuário. Se chega tarde, perde utilidade."},{"num":60,"meta":"FGV – Analista Legislativo (ALEGO) – ALEGO – Contador – 2026","q":"Uma entidade afirma que os seus relatórios financeiros para fins gerais seguem o objetivo divulgado na Estrutura Conceitual para Relatório Financeiro. Isso significa que os relatórios buscam","alts":["A) maximizar o resultado financeiro obtido pela entidade que reporta, em cumprimento às normas contábeis.","B) seguir as normas contábeis que considera mais apropriadas, para que a informação financeira seja mais prudente.","C) publicar seus dados financeiros com precisão suficiente para que estes não recebam ressalva de auditores independentes.","D) representar fonte de informação financeira ao maior número de usuários possível, em relação aos investimentos realizados na entidade que reporta.","E) fornecer informações financeiras sobre a entidade que reporta que sejam úteis a seus usuários primários na tomada de decisões referente à oferta de recursos à entidade."],"g":"E","topic":"entidade que reporta","chapter":"Capítulo 3 — Demonstrações Contábeis e Entidade que Reporta","memo":"A entidade que reporta não precisa ser uma entidade legal.","coment":"A alternativa correta é <b>E</b> — fornecer informações financeiras sobre a entidade que reporta que sejam úteis a seus usuários primários na tomada de decisões referente à oferta de recursos à entidade.. A entidade que reporta é o foco das demonstrações e não precisa corresponder necessariamente a uma entidade legal isolada."},{"num":61,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2025","q":"De acordo com a NBC TG Estrutura Conceitual- ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, as demonstrações contábeis consolidadas fornecem informações sobre os ativos, passivos, patrimônio líquido, receitas e despesas","alts":["A) apenas das controladas.","B) apenas da controladora.","C) da controladora e de suas controladas, como entidades independentes.","D) da controladora e de suas controladas, como uma única entidade que reporta."],"g":"D","topic":"demonstrações consolidadas","chapter":"Capítulo 3 — Demonstrações Contábeis e Entidade que Reporta","memo":"Demonstrações combinadas podem reunir entidades sem relação de controle entre todas.","coment":"A alternativa correta é <b>D</b> — da controladora e de suas controladas, como uma única entidade que reporta.. Nas demonstrações consolidadas, controladora e controladas são apresentadas como uma única entidade que reporta."},{"num":62,"meta":"FGV – Analista de Controle Interno (Pref Canaã Carajás) – Pref Canaã Carajás – 2025","q":"De acordo com a premissa da continuidade operacional, presente na Estrutura Conceitual para Relatório Financeiro, presume-se que a entidade não tem a intenção e nem a necessidade de","alts":["A) mudar a área ou o local de atuação.","B) entrar em liquidação ou deixar de negociar.","C) substituir as suas estratégias financeiras ou operacionais.","D) deixar de publicar seus relatórios contábeis ou econômicos.","E) continuar operando por tempo indeterminado ou desconhecido."],"g":"B","topic":"continuidade operacional","chapter":"Capítulo 3 — Demonstrações Contábeis e Entidade que Reporta","memo":"Se houver liquidação iminente, as demonstrações podem exigir base diferente da continuidade.","coment":"A alternativa correta é <b>B</b> — entrar em liquidação ou deixar de negociar.. Pela premissa de continuidade, presume-se que a entidade continuará operando, sem intenção ou necessidade de liquidação ou encerramento."},{"num":63,"meta":"FGV – Técnico (Pref Caraguatatuba) – Pref Caraguatatuba – Contabilidade – 2024","q":"De acordo com o Pronunciamento Técnico CPC 00 (R2) Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos e outros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Isso acontece porque muitos deles","alts":["A) recebem a maior parte do resultado gerado pela entidade que reporta.","B) representam os principais financiadores das entidades que reportam.","C) assumem os maiores riscos operacionais ao se relacionarem com a entidade que reporta.","D) contratam e remuneram a empresa de auditoria independente responsável pelos relatórios.","E) não podem exigir que as entidades que reportam forneçam informações diretamente a eles."],"g":"E","topic":"entidade que reporta","chapter":"Capítulo 3 — Demonstrações Contábeis e Entidade que Reporta","memo":"A entidade que reporta não precisa ser uma entidade legal.","coment":"A alternativa correta é <b>E</b> — não podem exigir que as entidades que reportam forneçam informações diretamente a eles.. A entidade que reporta é o foco das demonstrações e não precisa corresponder necessariamente a uma entidade legal isolada."},{"num":64,"meta":"FGV – Bach (CFC) – CFC – 1º Exame de Suficiência – 2024","q":"As demonstrações contábeis são normalmente elaboradas com base na suposição de que a entidade que reporta está em continuidade operacional. Desse modo, presume-se que a entidade não tem a intenção e nem a necessidade de","alts":["A) tornar-se internacional.","B) modificar a sua atividade-fim.","C) entrar em liquidação ou deixar de negociar.","D) expandir os seus negócios para outras localidades."],"g":"C","topic":"continuidade operacional","chapter":"Capítulo 3 — Demonstrações Contábeis e Entidade que Reporta","memo":"Se houver liquidação iminente, as demonstrações podem exigir base diferente da continuidade.","coment":"A alternativa correta é <b>C</b> — entrar em liquidação ou deixar de negociar.. Pela premissa de continuidade, presume-se que a entidade continuará operando, sem intenção ou necessidade de liquidação ou encerramento."},{"num":65,"meta":"FGV – Ana Esp (IMBEL) – IMBEL – Analista Contábil – 2021","q":"Em relação à entidade que reporta, pode-se presumir, por meio da premissa de continuidade operacional, que","alts":["A) não tem a necessidade de entrar em liquidação ou deixar de negociar, podendo haver a intenção.","B) não tem a intenção e nem a necessidade de entrar em liquidação ou deixar de negociar.","C) não apresentou prejuízo no período corrente.","D) apresenta perspectiva de lucros futuros.","E) não tem a intenção de comprar novas empresas."],"g":"B","topic":"continuidade operacional","chapter":"Capítulo 3 — Demonstrações Contábeis e Entidade qu
